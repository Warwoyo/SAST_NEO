checks:
  - id: "OJS-CFG-APACHE-001"
    name: "ServerTokens not set to Prod"
    description: "ServerTokens is not set to Prod, potentially exposing Apache version information."
    severity: "MEDIUM"
    category: "config"
    subcategory: "apache"
    cwe: "CWE-200"
    owasp: "A05:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'ServerTokens\s+(Full|OS|Minimal|Minor|Major)'
    remediation: "Set ServerTokens Prod to minimize information exposure."

  - id: "OJS-CFG-APACHE-002"
    name: "ServerSignature not disabled"
    description: "ServerSignature is not Off, exposing server information in error pages."
    severity: "LOW"
    category: "config"
    subcategory: "apache"
    cwe: "CWE-200"
    owasp: "A05:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'ServerSignature\s+On'
    remediation: "Set ServerSignature Off to hide server information from error pages."

  - id: "OJS-CFG-APACHE-003"
    name: "Directory listing enabled"
    description: "Options Indexes is enabled, allowing directory listing which may expose sensitive files."
    severity: "HIGH"
    category: "config"
    subcategory: "apache"
    cwe: "CWE-548"
    owasp: "A01:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'Options\s+.*?Indexes'
        - 'Options\s+\+Indexes'
    remediation: "Remove Indexes from Options or set Options -Indexes."

  - id: "OJS-CFG-APACHE-004"
    name: "mod_status or mod_info active without restriction"
    description: "Apache mod_status or mod_info is enabled without IP restriction, exposing server internals."
    severity: "HIGH"
    category: "config"
    subcategory: "apache"
    cwe: "CWE-200"
    owasp: "A05:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '<Location\s+/server-(status|info)>(?!.*?Require\s+ip|Allow\s+from)'
        - 'SetHandler\s+server-(status|info)'
    remediation: "Restrict mod_status and mod_info to trusted IPs only, or disable them."

  - id: "OJS-CFG-APACHE-005"
    name: "Missing security headers in Apache"
    description: "Important HTTP security headers are not configured."
    severity: "MEDIUM"
    category: "config"
    subcategory: "apache"
    cwe: "CWE-16"
    owasp: "A05:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '(?!.*X-Frame-Options)(?!.*X-Content-Type-Options)<VirtualHost'
    remediation: >
      Add to Apache config:
      Header always set X-Frame-Options "SAMEORIGIN"
      Header always set X-Content-Type-Options "nosniff"
