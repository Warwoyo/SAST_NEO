checks:
  - id: "OJS-CFG-NGX-001"
    name: "Legacy TLS protocols permitted"
    description: "Nginx allows TLSv1 or TLSv1.1 which have known vulnerabilities."
    severity: "HIGH"
    category: "config"
    subcategory: "nginx"
    cwe: "CWE-326"
    owasp: "A02:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'ssl_protocols\s+.*?(TLSv1\.0|TLSv1\b|TLSv1\.1)'
    remediation: "Set ssl_protocols TLSv1.2 TLSv1.3; to only allow secure protocols."

  - id: "OJS-CFG-NGX-002"
    name: "HSTS header not configured"
    description: "HTTP Strict Transport Security header is not set, allowing protocol downgrade attacks."
    severity: "HIGH"
    category: "config"
    subcategory: "nginx"
    cwe: "CWE-16"
    owasp: "A05:2021"
    config_check:
      field: "add_header"
      condition: "missing"
    pattern_match:
      type: "regex"
      patterns:
        - '(?!.*Strict-Transport-Security)^(?=.*server)'
    remediation: 'Add: add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;'

  - id: "OJS-CFG-NGX-003"
    name: "Missing security headers"
    description: "Important security headers are not configured in the Nginx server block."
    severity: "MEDIUM"
    category: "config"
    subcategory: "nginx"
    cwe: "CWE-16"
    owasp: "A05:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '(?!.*X-Frame-Options)(?!.*X-Content-Type-Options)server\s*\{'
    remediation: >
      Add security headers:
      add_header X-Frame-Options "SAMEORIGIN";
      add_header X-Content-Type-Options "nosniff";
      add_header Content-Security-Policy "default-src 'self'";

  - id: "OJS-CFG-NGX-004"
    name: "PHP execution allowed in upload directories"
    description: "PHP execution is not disabled in upload directories, allowing webshell execution."
    severity: "CRITICAL"
    category: "config"
    subcategory: "nginx"
    cwe: "CWE-434"
    owasp: "A04:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'location\s+.*(upload|files|public)(?!.*?deny|return\s+403|fastcgi_pass)'
    remediation: >
      Add to Nginx config:
      location ~ ^/(files|public)/.*\.php$ { deny all; }

  - id: "OJS-CFG-NGX-005"
    name: "Sensitive directories not protected"
    description: "Access to OJS sensitive directories (classes/, lib/, tools/) is not restricted."
    severity: "MEDIUM"
    category: "config"
    subcategory: "nginx"
    cwe: "CWE-552"
    owasp: "A01:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '(?!.*location.*(classes|lib|tools|dbscripts))server\s*\{'
    remediation: >
      Block access to sensitive directories:
      location ~ ^/(classes|lib|tools|dbscripts)/ { deny all; }
