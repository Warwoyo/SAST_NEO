checks:
  - id: "OJS-CFG-SEC-001"
    name: "Security salt uses default or empty value"
    description: "The security salt is empty or set to the default value ('YouMustSetASecretKeyHere!!'), weakening all cryptographic operations."
    severity: "CRITICAL"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-330"
    owasp: "A02:2021"
    config_check:
      field: "security.salt"
      condition: "regex_match"
      pattern: "^$|^YouMustSetASecretKeyHere!!$"
    remediation: >
      Set a long, unique, random salt value in config.inc.php. Generate one with:
      openssl rand -hex 32

  - id: "OJS-CFG-SEC-002"
    name: "SSL/HTTPS not enforced"
    description: "force_ssl is disabled or commented out, allowing insecure HTTP connections."
    severity: "HIGH"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-319"
    owasp: "A02:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '^\s*;\s*force_ssl\s*='
        - '^\s*force_ssl\s*=\s*Off'
    remediation: "Set force_ssl = On in config.inc.php and ensure it is not commented out."

  - id: "OJS-CFG-SEC-003"
    name: "Allowed hosts not configured"
    description: "allowed_hosts is empty or not set, potentially allowing host header attacks."
    severity: "HIGH"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-16"
    owasp: "A05:2021"
    config_check:
      field: "security.allowed_hosts"
      condition: "empty"
    remediation: >
      Set allowed_hosts to your domain(s):
      allowed_hosts = "['yourdomain.com', 'www.yourdomain.com']"

  - id: "OJS-CFG-SEC-004"
    name: "Path info not disabled"
    description: "disable_path_info is not set to Off, which may expose internal routing information."
    severity: "MEDIUM"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-200"
    owasp: "A05:2021"
    config_check:
      field: "security.disable_path_info"
      condition: "not_equals"
      value: "Off"
    remediation: "Set disable_path_info = Off if not using path-based URLs."

  - id: "OJS-CFG-SEC-005"
    name: "Debug mode enabled"
    description: "Debug mode, stack traces, or error displays are enabled, which can leak sensitive server information."
    severity: "MEDIUM"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-489"
    owasp: "A05:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '^\s*(debug|show_stacktrace|display_errors)\s*=\s*On'
    remediation: "Ensure 'debug', 'show_stacktrace', and 'display_errors' are set to 'Off' in production."

  - id: "OJS-CFG-SEC-006"
    name: "Trust X-Forwarded-For enabled dangerously"
    description: "trust_x_forwarded_for is enabled. This can allow IP spoofing if the server is not behind a trusted proxy."
    severity: "MEDIUM"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-290"
    owasp: "A05:2021"
    config_check:
      field: "general.trust_x_forwarded_for"
      condition: "equals"
      value: "On"
    remediation: "Set trust_x_forwarded_for = Off unless the application is behind a trusted reverse proxy."

  - id: "OJS-CFG-SEC-007"
    name: "CSRF Protection Disabled or Missing"
    description: >
      The application configuration does not enforce CSRF token validation globally.
      Without this protection, all state-changing POST endpoints are vulnerable to
      Cross-Site Request Forgery attacks (see CVE-2023-5626, CVE-2023-6671).
    severity: "HIGH"
    category: "config"
    subcategory: "csrf"
    cwe: "CWE-352"
    owasp: "A01:2021"
    cve_references:
      - "CVE-2023-5626"
      - "CVE-2023-6671"
    config_check:
      field: "security.csrfValidation"
      condition: "not_equals"
      value: "true"
    remediation: >
      Set security.csrfValidation = On in config.inc.php and ensure all POST handlers
      call validateCsrfToken() before processing requests.

  - id: "OJS-CFG-SEC-008"
    name: "Session Cookie SameSite Attribute Not Set to Strict"
    description: >
      Without the SameSite=Strict attribute, session cookies are sent in cross-origin
      requests, enabling CSRF attacks to act on behalf of authenticated users even when
      CSRF tokens are implemented (defense-in-depth gap). This amplifies the risk from
      CVE-2023-5626 and CVE-2023-6671.
    severity: "MEDIUM"
    category: "config"
    subcategory: "session"
    cwe: "CWE-1275"
    owasp: "A01:2021"
    config_check:
      field: "session.cookie_samesite"
      condition: "not_equals"
      value: "Strict"
    remediation: >
      Set session.cookie_samesite = Strict and session.cookie_secure = On in php.ini
      or via ini_set() during bootstrap. Also set session.cookie_httponly = On to
      prevent JavaScript access to session cookies, reducing XSS impact.

  - id: "OJS-CFG-SEC-009"
    name: "Content Security Policy (CSP) Header Not Configured"
    description: >
      Without a Content Security Policy, exploited XSS vulnerabilities (CVE-2023-5903,
      CVE-2024-24511, CVE-2024-24512, CVE-2024-25434, etc.) can load external scripts,
      exfiltrate data, or redirect users without any browser-level restriction.
    severity: "HIGH"
    category: "config"
    subcategory: "http_headers"
    cwe: "CWE-1021"
    owasp: "A05:2021"
    cve_references:
      - "CVE-2023-5903"
      - "CVE-2024-24511"
      - "CVE-2024-24512"
    config_check:
      field: "security.content_security_policy"
      condition: "missing"
    remediation: >
      Configure a strict CSP header via the web server or OJS plugin:
      Content-Security-Policy: default-src 'self'; script-src 'self'; object-src 'none';
      base-uri 'self'; form-action 'self'.
      Start in report-only mode (Content-Security-Policy-Report-Only) to identify
      violations before enforcing.

  - id: "OJS-CFG-SEC-010"
    name: "XML External Entity Loading Enabled (XXE Risk)"
    description: >
      PHP's libxml library has external entity loading enabled by default in older
      versions, which is the root cause of CVE-2024-56525. If the application does not
      explicitly disable it, all XML parsing operations are potentially vulnerable
      to XXE attacks.
    severity: "CRITICAL"
    category: "config"
    subcategory: "xml_processing"
    cwe: "CWE-611"
    owasp: "A05:2021"
    cve_references:
      - "CVE-2024-56525"
    config_check:
      field: "xml.libxml_disable_entity_loader"
      condition: "not_equals"
      value: "true"
    remediation: >
      Call libxml_disable_entity_loader(true) at application bootstrap (before any XML
      parsing) for PHP versions < 8.0. In PHP 8.0+, external entity loading is disabled
      by default. Additionally pass LIBXML_NONET to all simplexml/DOMDocument calls to
      prevent network-based XXE.

  - id: "OJS-CFG-SEC-011"
    name: "Plugin Upload Feature Accessible to Non-Administrator Roles"
    description: >
      The Plugin Upload feature should be restricted to Site Administrators only.
      If accessible to Journal Managers or Editors, it allows backdoor installation via
      repackaged plugin archives, as demonstrated in the Plugin Upload RCE scenario
      (OJS-SC-RCE-003) and the XXE plugin escalation (CVE-2024-56525).
    severity: "HIGH"
    category: "config"
    subcategory: "access_control"
    cwe: "CWE-269"
    owasp: "A01:2021"
    cve_references:
      - "CVE-2024-56525"
    config_check:
      field: "plugins.upload_minimum_role"
      condition: "not_equals"
      value: "ROLE_ID_SITE_ADMIN"
    remediation: >
      Restrict plugin upload and installation to users with the ROLE_ID_SITE_ADMIN role.
      Audit existing plugin management ACL checks and add role verification before
      allowing plugin upload, installation, enable, or disable operations.

  - id: "OJS-CFG-SEC-012"
    name: "OJS Version Not Updated – Known Vulnerable Release"
    description: >
      The configured OJS version is known to contain multiple critical and high
      severity vulnerabilities including RCE (CVE-2023-47271), XSS (CVE-2023-5903,
      CVE-2024-50965), CSRF (CVE-2023-5626), and XXE (CVE-2024-56525). Running an
      unpatched version exposes the system to active exploitation.
    severity: "CRITICAL"
    category: "config"
    subcategory: "patch_management"
    cwe: "CWE-1104"
    owasp: "A06:2021"
    cve_references:
      - "CVE-2023-47271"
      - "CVE-2023-5626"
      - "CVE-2023-5903"
      - "CVE-2024-50965"
      - "CVE-2024-56525"
    config_check:
      field: "general.application_version"
      condition: "regex_match"
      value: '^3\.([0-2]\.|3\.0-(0?[0-9]|1[0-5]))'
    remediation: >
      Upgrade OJS to version 3.3.0-16 or later. Review the PKP security advisories at
      https://pkp.sfu.ca/category/news/announcements/security-announcements/ before
      upgrading and apply all relevant patches. Establish a routine update schedule
      and subscribe to PKP security mailing lists.
