checks:
  - id: "OJS-CFG-DB-001"
    name: "Database password not set"
    description: "The database password is empty or not configured in config.inc.php."
    severity: "CRITICAL"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-521"
    owasp: "A07:2021"
    config_check:
      field: "database.password"
      condition: "empty"
    remediation: "Set a strong, unique password for the database in config.inc.php."

  - id: "OJS-CFG-DB-002"
    name: "Database host uses default value"
    description: "The database host is set to 'localhost'. Verify the database is not externally accessible."
    severity: "INFO"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-16"
    owasp: "A05:2021"
    config_check:
      field: "database.host"
      condition: "equals"
      value: "localhost"
      note: "Ensure the database is not accessible externally"
    remediation: "Verify that the database is bound to localhost only and not exposed to the network."

  - id: "OJS-CFG-DB-003"
    name: "Insecure database driver"
    description: "The database driver is not a recommended secure option (mysqli or pgsql)."
    severity: "HIGH"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-16"
    owasp: "A05:2021"
    config_check:
      field: "database.driver"
      condition: "not_in"
      allowed_values: ["mysqli", "pgsql"]
    remediation: "Use 'mysqli' or 'pgsql' as the database driver for better security and performance."

  - id: "OJS-CFG-DB-004"
    name: "Default database name"
    description: "The database name uses the common default value 'ojs'."
    severity: "LOW"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-16"
    owasp: "A01:2021"
    config_check:
      field: "database.name"
      condition: "equals"
      value: "ojs"
    remediation: "Use a unique database name that is not easily guessable."

  - id: "OJS-CFG-DB-005"
    name: "Weak database password (under 12 characters)"
    description: "The database password is shorter than 12 characters, making it vulnerable to brute-force attacks."
    severity: "HIGH"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-521"
    owasp: "A07:2021"
    config_check:
      field: "database.password"
      condition: "regex_match"
      pattern: "^.{1,11}$"
    remediation: "Use a password with at least 12 characters, including uppercase, lowercase, numbers, and special symbols."

  - id: "OJS-CFG-DB-006"
    name: "Default database username"
    description: "The database username is set to the default value 'ojs'."
    severity: "HIGH"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-16"
    owasp: "A01:2021"
    config_check:
      field: "database.username"
      condition: "equals"
      value: "ojs"
    remediation: "Change the database username to a unique and less guessable value."
