checks:
  - id: "OJS-CFG-EMAIL-001"
    name: "SMTP authentication without TLS"
    description: "SMTP is configured with authentication but without encryption, sending credentials in plaintext."
    severity: "HIGH"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-319"
    owasp: "A02:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'smtp_auth\s*=\s*(ssl|tls|STARTTLS)'
    config_check:
      field: "email.smtp_auth"
      condition: "missing"
    remediation: "Enable SMTP encryption: set smtp_auth = tls or smtp_auth = ssl."

  - id: "OJS-CFG-EMAIL-002"
    name: "SMTP password in plaintext config"
    description: "The SMTP password is stored in plaintext in config.inc.php."
    severity: "MEDIUM"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-256"
    owasp: "A02:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'smtp_password\s*=\s*\S+'
    remediation: "Consider using environment variables for SMTP credentials."

  - id: "OJS-CFG-EMAIL-003"
    name: "Envelope sender enabled without restrictions"
    description: "allow_envelope_sender is enabled which may allow email spoofing."
    severity: "LOW"
    category: "config"
    subcategory: "ojs"
    cwe: "CWE-16"
    config_check:
      field: "email.allow_envelope_sender"
      condition: "equals"
      value: "On"
    remediation: "Disable allow_envelope_sender unless specifically needed, and configure SPF/DKIM."
