rules:
  # ============================================================
  # DANGEROUS FILE EXTENSION RULES
  # ============================================================

  - id: "OJS-UPL-EXT-001"
    name: "PHP Executable File Upload Detected"
    description: >
      A file with a PHP-executable extension was uploaded to the OJS system. This
      directly enables Remote Code Execution if the file is placed in a web-accessible
      directory. This covers CVE-2012-1468 (blacklist bypass) and CVE-2023-47271
      (XML import cover image bypass), as well as the Plugin Upload RCE scenario.
    severity: "CRITICAL"
    category: "uploaded_file"
    subcategory: "dangerous_extension"
    cwe: "CWE-434"
    owasp: "A03:2021"
    cve_references:
      - "CVE-2012-1468"
      - "CVE-2023-47271"
    dangerous_extensions:
      - ".php"
      - ".php3"
      - ".php4"
      - ".php5"
      - ".php7"
      - ".phtml"
      - ".phar"
      - ".phps"
      - ".php-s"
      - ".pht"
    remediation: >
      Reject all uploads with PHP-executable extensions. Implement both extension
      allowlist validation and server-side MIME type verification using finfo_file().
      Configure the web server to deny PHP execution in all upload directories.

  - id: "OJS-UPL-EXT-002"
    name: "Server-Side Script Upload – Non-PHP Languages"
    description: >
      A file with a server-side executable extension for languages other than PHP
      (ASP, JSP, Perl, Python, Ruby, CGI) was uploaded. If the server hosts these
      runtimes, execution of these files could lead to Remote Code Execution.
    severity: "HIGH"
    category: "uploaded_file"
    subcategory: "dangerous_extension"
    cwe: "CWE-434"
    owasp: "A03:2021"
    dangerous_extensions:
      - ".asp"
      - ".aspx"
      - ".jsp"
      - ".jspx"
      - ".pl"
      - ".py"
      - ".rb"
      - ".cgi"
      - ".shtml"
      - ".shtm"
    remediation: >
      Include these extensions in the upload rejection allowlist. If the application
      must accept script files for legitimate purposes, store them in an isolated
      directory with execution permissions disabled at the web server level.

  - id: "OJS-UPL-EXT-003"
    name: "Potentially Dangerous Archive Upload"
    description: >
      Archive files (tar.gz, zip, etc.) can contain embedded malicious scripts. In the
      OJS Plugin Upload RCE scenario, a repackaged .tar.gz archive was used to deliver
      a PHP webshell inside a legitimate plugin structure. Archives should be scanned
      before extraction.
    severity: "MEDIUM"
    category: "uploaded_file"
    subcategory: "dangerous_extension"
    cwe: "CWE-434"
    owasp: "A03:2021"
    dangerous_extensions:
      - ".tar.gz"
      - ".tgz"
      - ".tar.bz2"
      - ".tar.xz"
      - ".zip"
      - ".rar"
      - ".7z"
    remediation: >
      Do not extract archives in web-accessible directories without content scanning.
      Recursively inspect all files within the archive for dangerous extensions before
      extraction. Limit archive uploads to Site Administrators for the Plugin Upload
      feature. Use a dedicated quarantine directory for extraction and scanning.

  # ============================================================
  # MALICIOUS CODE PATTERN RULES (WEBSHELL / BACKDOOR DETECTION)
  # ============================================================

  - id: "OJS-UPL-SHELL-001"
    name: "PHP Webshell – Command Execution via GET/POST Parameter"
    description: >
      Detects the classic one-liner PHP webshell pattern where a system command
      execution function is called with a value sourced directly from a user-supplied
      HTTP parameter. This is the exact payload used in the Plugin Upload RCE
      (shell_plugin.php) and CVE-2023-47271 (poc.php) exploitations:
      <?php system($_GET['cmd']); ?>
    severity: "CRITICAL"
    category: "uploaded_file"
    subcategory: "webshell"
    cwe: "CWE-78"
    owasp: "A03:2021"
    cve_references:
      - "CVE-2023-47271"
    pattern_match:
      type: "regex"
      patterns:
        - '<\?php\s*(system|exec|shell_exec|passthru|popen|proc_open)\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)\s*\['
        - '<\?php\s*(system|exec|shell_exec|passthru)\s*\(\s*\$_(GET|POST|REQUEST)\[.cmd.\]\s*\)'
        - '(system|exec|shell_exec|passthru)\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)\s*\[.*?\]\s*\)'
    remediation: >
      Remove the file immediately and investigate how it was uploaded. Audit the plugin
      upload and XML import workflows for insufficient validation. Review server access
      logs for evidence of webshell execution. Rotate all application credentials.

  - id: "OJS-UPL-SHELL-002"
    name: "PHP Webshell – eval() with User Input"
    description: >
      Detects PHP backdoors that use eval() to execute dynamically constructed code
      from user-supplied input or decoded strings. These are more sophisticated than
      simple system() webshells and can evade basic pattern matching.
    severity: "CRITICAL"
    category: "uploaded_file"
    subcategory: "webshell"
    cwe: "CWE-78"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'eval\s*\(\s*(base64_decode|gzinflate|str_rot13|gzuncompress|rawurldecode)\s*\('
        - 'eval\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)\s*\['
        - '@eval\s*\(\s*\$'
        - 'preg_replace\s*\(.*\/e.*,\s*\$_(GET|POST)'
        - 'assert\s*\(\s*\$_(GET|POST|REQUEST)'
    remediation: >
      Quarantine and delete the file. eval() with user input or encoded data is a
      strong indicator of intentional backdoor installation. Conduct a full integrity
      check of the OJS installation against official checksums.

  - id: "OJS-UPL-SHELL-003"
    name: "PHP Backdoor – File System Manipulation for Defacement"
    description: >
      Detects PHP scripts that write arbitrary content to files on the server filesystem,
      consistent with the CVE-2023-47271 defacement payload that overwrites index.php
      with a gambling site template using system('echo ... > /var/www/html/index.php').
    severity: "CRITICAL"
    category: "uploaded_file"
    subcategory: "webshell"
    cwe: "CWE-434"
    owasp: "A03:2021"
    cve_references:
      - "CVE-2023-47271"
    pattern_match:
      type: "regex"
      patterns:
        - 'system\s*\(\s*.echo\s.*>\s*.*index\.php'
        - 'file_put_contents\s*\(\s*.*/index\.php'
        - 'fwrite\s*\(.*,\s*\$deface'
        - '\$deface_content\s*=\s*.'
        - 'system\s*\(.*echo.*>\s*/var/www'
    remediation: >
      Remove the file and restore index.php from a known-good backup or the official
      OJS release package. Verify file integrity across the entire web root. Restrict
      the Apache/Nginx process user from having write access to the OJS application
      directory where possible.

  - id: "OJS-UPL-SHELL-004"
    name: "PHP Backdoor – Encoded/Obfuscated Payload"
    description: >
      Detects PHP files containing obfuscated code patterns commonly used to hide
      webshell functionality from basic file scanners. Includes Base64 chaining,
      variable function calls, and character-based encoding tricks. CVE-2023-47271
      used Base64-encoded PHP inside an XML embed tag.
    severity: "HIGH"
    category: "uploaded_file"
    subcategory: "webshell"
    cwe: "CWE-506"
    owasp: "A03:2021"
    cve_references:
      - "CVE-2023-47271"
    pattern_match:
      type: "regex"
      patterns:
        - '\$\w+\s*=\s*base64_decode\s*\(.*\);\s*\$\w+\s*=\s*base64_decode'
        - 'str_replace\s*\(.*,\s*.*,\s*base64_decode'
        - '\$\{.\\x[0-9a-fA-F]{2}.\}'
        - '\\x(73|65|79|73)(\\x(74|78|65|63))+'
        - 'gzinflate\s*\(\s*base64_decode\s*\('
        - 'str_rot13\s*\(\s*gzinflate\s*\('
    remediation: >
      Treat any uploaded file with obfuscated PHP as malicious. Quarantine and delete
      it. Run a comprehensive malware scan on the server using tools such as ClamAV or
      LMD (Linux Malware Detect). Review all recently uploaded plugin archives.

  - id: "OJS-UPL-SHELL-005"
    name: "XML Payload with Embedded PHP File (XXE / Import Attack)"
    description: >
      Detects XML import files that contain references to PHP-extension filenames in
      the <cover_image> or similar tags, or that declare DOCTYPE with SYSTEM/PUBLIC
      entity references. These are the hallmarks of both the CVE-2023-47271 arbitrary
      file upload attack and the CVE-2024-56525 XXE attack vectors.
    severity: "CRITICAL"
    category: "uploaded_file"
    subcategory: "malicious_xml"
    cwe: "CWE-434"
    owasp: "A03:2021"
    cve_references:
      - "CVE-2023-47271"
      - "CVE-2024-56525"
    pattern_match:
      type: "regex"
      patterns:
        - '<cover_image>[^<]*\.(php[3-7]?|phtml|phar|asp|jsp)[^<]*<\/cover_image>'
        - '<!DOCTYPE\s+\w+\s+\[.*<!ENTITY'
        - '<!ENTITY\s+\w+\s+SYSTEM\s+["\x27]'
        - '<!ENTITY\s+\w+\s+PUBLIC\s+["\x27]'
        - '<embed\s+encoding="base64">[A-Za-z0-9+/]{20,}={0,2}<\/embed>'
    remediation: >
      Reject XML imports that declare DOCTYPE or external ENTITY definitions. Validate
      all <cover_image> values against an image extension allowlist before processing
      the embedded data. Scan Base64-encoded content within XML by decoding and checking
      the file header magic bytes before writing to disk.

  - id: "OJS-UPL-SHELL-006"
    name: "Serialized PHP Object in Uploaded File"
    description: >
      Detects the presence of PHP serialized object strings within uploaded files.
      While serialized data may appear in legitimate contexts, its presence in uploaded
      content is a strong indicator of an attempted PHP Object Injection attack
      (CVE-2019-19909). Attackers may attempt to store gadget chains in uploaded files
      for later deserialization.
    severity: "HIGH"
    category: "uploaded_file"
    subcategory: "injection"
    cwe: "CWE-502"
    owasp: "A08:2021"
    cve_references:
      - "CVE-2019-19909"
    pattern_match:
      type: "regex"
      patterns:
        - 'O:\d+:"[A-Za-z_\\\\]+":(\d+):\{'
        - 'a:\d+:\{(i:\d+;|s:\d+:")'
        - 'C:\d+:"[A-Za-z_]+":(\d+):\{'
        - '^[aObsiNd]:\d+:'
    remediation: >
      Reject uploaded files containing PHP serialized object signatures. If the
      application receives serialized data through file uploads for legitimate purposes,
      validate it against an explicit class allowlist and consider migrating to JSON-
      based data exchange instead.
