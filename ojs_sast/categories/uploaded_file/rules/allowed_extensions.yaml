# Allowed file extensions per OJS upload context
contexts:
  submission_file:
    description: "Article/manuscript submission files"
    allowed_extensions:
      - ".pdf"
      - ".doc"
      - ".docx"
      - ".odt"
      - ".rtf"
      - ".tex"
      - ".epub"
      - ".xml"
    max_size_mb: 50

  galley:
    description: "Published galley files (reader-facing)"
    allowed_extensions:
      - ".pdf"
      - ".html"
      - ".htm"
      - ".xml"
      - ".epub"
    max_size_mb: 100

  cover_image:
    description: "Journal/article cover images"
    allowed_extensions:
      - ".jpg"
      - ".jpeg"
      - ".png"
      - ".gif"
      - ".webp"
    max_size_mb: 5

  supplementary:
    description: "Supplementary files (datasets, media)"
    allowed_extensions:
      - ".pdf"
      - ".doc"
      - ".docx"
      - ".xls"
      - ".xlsx"
      - ".csv"
      - ".zip"
      - ".tar"
      - ".gz"
      - ".mp3"
      - ".mp4"
      - ".avi"
      - ".mov"
      - ".jpg"
      - ".jpeg"
      - ".png"
      - ".gif"
    max_size_mb: 200

  plugin_zip:
    description: "Plugin archive uploads (admin only)"
    allowed_extensions:
      - ".tar"
      - ".gz"
      - ".zip"
    max_size_mb: 50

# Extensions that are ALWAYS dangerous regardless of context
dangerous_extensions:
  critical:
    - ".php"
    - ".phtml"
    - ".php3"
    - ".php4"
    - ".php5"
    - ".php7"
    - ".phps"
    - ".phar"
    - ".cgi"
    - ".pl"
    - ".py"
    - ".sh"
    - ".bash"
    - ".jsp"
    - ".asp"
    - ".aspx"
  high:
    - ".htaccess"
    - ".htpasswd"
    - ".ini"
    - ".env"
    - ".exe"
    - ".dll"
    - ".bat"
    - ".cmd"
    - ".com"
    - ".scr"
  medium:
    - ".js"
    - ".svg"
    - ".html"
    - ".shtml"
