rules:
  - id: "OJS-SC-HASH-001"
    name: "Weak hash algorithm for password storage"
    description: >
      md5() or sha1() is used for password hashing, which is
      computationally fast and vulnerable to brute-force attacks.
    severity: "HIGH"
    category: "source_code"
    subcategory: "crypto"
    cwe: "CWE-328"
    owasp: "A02:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'md5\s*\(\s*\$\w*(pass|pwd|password)'
        - 'sha1\s*\(\s*\$\w*(pass|pwd|password)'
        - '(password|passwd)\s*=\s*md5\s*\('
        - '(password|passwd)\s*=\s*sha1\s*\('
    remediation: >
      Use password_hash() with PASSWORD_BCRYPT or PASSWORD_ARGON2ID.
      Verify with password_verify().

  - id: "OJS-SC-HASH-002"
    name: "MD5 used for security-sensitive operation"
    description: >
      md5() is used for generating tokens, signatures, or other
      security-sensitive values where collision resistance matters.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "crypto"
    cwe: "CWE-328"
    owasp: "A02:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'md5\s*\(\s*(uniqid|time|rand|microtime)\s*\('
        - 'md5\s*\(.*?(token|secret|key|hash|sign)'
    remediation: >
      Use hash('sha256', ...) or hash_hmac() for security operations.
      For tokens, use random_bytes() or bin2hex(random_bytes(32)).

  - id: "OJS-SC-HASH-003"
    name: "Unsalted hash usage"
    description: >
      A hash function is used without a salt, making it vulnerable
      to rainbow table attacks.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "crypto"
    cwe: "CWE-916"
    owasp: "A02:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '(md5|sha1|sha256)\s*\(\s*\$\w+\s*\)(?!.*salt)'
    remediation: >
      Use password_hash() which automatically handles salting.
      If using hash(), prepend a unique per-user salt.
