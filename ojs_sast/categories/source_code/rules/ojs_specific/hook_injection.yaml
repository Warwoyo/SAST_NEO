rules:
  - id: "OJS-SC-HOOK-001"
    name: "Hook injection via user input"
    description: >
      OJS hook names or callback functions are derived from user input,
      allowing an attacker to hijack the hook system.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-94"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'HookRegistry::register\s*\(.*?\$_(GET|POST|REQUEST)'
        - 'HookRegistry::call\s*\(.*?\$_(GET|POST|REQUEST)'
    remediation: >
      Never use user input for hook names or callbacks.
      Use a whitelist of allowed hook names.

  - id: "OJS-SC-HOOK-002"
    name: "Unsafe hook callback execution"
    description: >
      A hook callback uses call_user_func or similar with
      potentially user-controlled callback names.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-94"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'call_user_func\s*\(\s*\$'
        - 'call_user_func_array\s*\(\s*\$'
    remediation: >
      Validate callback functions before execution.
      Use typed callable parameters.

  - id: "OJS-SC-HOOK-003"
    name: "Hook modifying security-critical data"
    description: >
      A hook handler modifies authentication or authorization data
      without proper validation.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-284"
    owasp: "A01:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'HookRegistry::register\s*\(\s*["\''].*(Auth|Login|Session|Role|Access).*?["\'']'
    remediation: >
      Audit all hooks that modify security-critical data.
      Ensure proper validation and logging.
