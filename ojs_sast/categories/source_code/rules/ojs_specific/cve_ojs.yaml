rules:
  # ============================================================
  # OJS SAST VULNERABILITY RULES (GENERATED FROM CVE LIST)
  # ============================================================

  - id: "OJS-SC-CVE-001"
    name: "CVE-2025-67890 - Path Traversal in NativeXmlIssueGalleyFilter"
    description: >
      Kerentanan Path Traversal pada Native XML Plugin (Import/Export).  Tag XML
      'file_name' langsung ditetapkan sebagai nama file server tanpa sanitasi
      yang memadai,  menyebabkan penimpaan file sembarang (arbitrary file
      overwrite) yang dapat mengarah pada eksekusi kode jarak jauh (RCE).
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-22"
    owasp: "A01:2021"
    ojs_versions_affected: "<= 3.3.0-21, <= 3.4.0-9, and <= 3.5.0-1"
    cve_references:
      - "CVE-2025-67890"
    taint_analysis:
      sources:
        - "$o->textContent"
      sinks:
        - "setServerFileName"
      sanitizers:
        - "preg_replace"
        - "basename"
    pattern_match:
      type: "regex"
      patterns:
        - "setServerFileName\\s*\\(\\s*\\$o->textContent\\s*\\)"
    remediation: >
      Gunakan preg_replace dan str_replace untuk membatasi karakter hanya pada
      a-z, 0-9, '.', dan '-' sebelum mengoper input ke fungsi setServerFileName.
    false_positive_notes: >
      Input telah disaring dengan aman menggunakan regex pengganti yang ketat
      (seperti /[^a-z0-9\.\-]+/) sebelum properti diisi.
    references:
      - "https://github.com/pkp/pkp-lib/issues/11973"
      - "http://karmainsecurity.com/KIS-2025-11"

  - id: "OJS-SC-CVE-002"
    name: "CVE-2025-67893 - LESS Code Injection in baseColour"
    description: >
      Theme Settings API rentan terhadap Injeksi Kode LESS. Parameter
      'baseColour' digabungkan tanpa sanitasi  ke dalam variabel LESS yang dapat
      menyebabkan SSRF atau Local File Read saat diparsing.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-94"
    owasp: "A03:2021"
    ojs_versions_affected: "<= 3.3.0-21, <= 3.4.0-9, and <= 3.5.0-1"
    cve_references:
      - "CVE-2025-67893"
    taint_analysis:
      sources:
        - "$this->getOption('baseColour')"
      sinks:
        - "$additionalLessVariables"
        - "Less_Parser::parse"
      sanitizers:
        - "preg_match"
    pattern_match:
      type: "regex"
      patterns:
        - "\\$additionalLessVariables\\[\\]\\s*=\\s*['\"]@bg-base:['\"]\\s*\\.\
          \\s*\\$this->getOption\\s*\\(\\s*['\"]baseColour['\"]\\s*\\)"
    remediation: >
      Validasi parameter menggunakan regex kode warna heksadesimal yang ketat:
      preg_match('/^#[0-9a-fA-F]{1,6}$/', $value).
    false_positive_notes: >
      Input telah tervalidasi oleh regex heksadesimal yang ketat sebelum
      penyisipan ke variabel parser LESS.
    references:
      - "https://github.com/pkp/pkp-lib/issues/11974"

  - id: "OJS-SC-CVE-003"
    name: "CVE-2025-67889 - SQL Injection in Institution Collector"
    description: >
      Adanya SQL Injection bertipe boolean/time-based pada endpoint Institutions
      API akibat parameter 'searchPhrase' yang diinterpolasi langsung ke dalam
      fungsi DB::raw tanpa proses bind parameters yang aman.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-89"
    owasp: "A03:2021"
    ojs_versions_affected: "<= 3.4.0-9, and <= 3.5.0-1"
    cve_references:
      - "CVE-2025-67889"
    taint_analysis:
      sources:
        - "$this->searchPhrase"
        - "$word"
      sinks:
        - "DB::raw"
      sanitizers:
        - "$pdo->quote"
    pattern_match:
      type: "regex"
      patterns:
        - "DB::raw\\s*\\(\\s*[\"']lower\\('%\\{\\$word\\}%'\\)[\"']\\s*\\)"
    remediation: >
      Gunakan API bind parameter dari Laravel (?) atau bungkus input variabel
      secara eksplisit menggunakan $pdo->quote() sebelum melakukan penyambungan
      query.
    false_positive_notes: >
      Variabel berada di dalam DB::raw() namun variabel tersebut secara
      eksplisit di-*cast* menjadi integer atau dibungkus PDO quote.
    references:
      - "https://github.com/pkp/pkp-lib/issues/11977"

  - id: "OJS-SC-CVE-004"
    name: "CVE-2025-67892 - Login CSRF in PKP-WAL"
    description: >
      Fungsi proses login tidak melakukan validasi middleware token anti-CSRF,
      sehingga rentan  terhadap serangan Cross-Site Request Forgery (CSRF) pada
      saat autentikasi akun.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-352"
    owasp: "A01:2021"
    ojs_versions_affected: "<= 3.3.0-21, <= 3.4.0-9, and <= 3.5.0-1"
    cve_references:
      - "CVE-2025-67892"
    pattern_match:
      type: "regex"
      patterns:
        - "(?s)public\\s+static\\s+function\\s+login\\s*\\(.*?\\)\\s*\\{(?:(?!c\
          heckCSRF).)*?\\$user->getAuthId"
        - "(?s)public\\s+static\\s+function\\s+login\\s*\\(.*?\\)\\s*\\{(?:(?!c\
          heckCSRF).)*?verifyPassword"
    remediation: >
      Panggil $request->checkCSRF() di awal fungsi pemrosesan handler POST
      login, dan tolak permintaan jika token tidak valid.
    false_positive_notes: >
      API yang bersifat *stateless* (misal: JWT, OAuth) yang memang imun
      terhadap CSRF, atau sistem memiliki proteksi CSRF di tingkat
      global/middleware framework.
    references:
      - "https://github.com/pkp/pkp-lib/issues/11978"

  - id: "OJS-SC-CVE-005"
    name: "CVE-2023-47271 - RCE via Path Traversal in NativeImportExportPlugin"
    description: >
      Pembuatan file tanpa sanitasi regex yang kuat dari tag <cover_image> (dari
      format XML)  menyebabkan modifikasi path file sesuka hati, berujung pada
      ekseskusi kode lokal/jarak jauh saat menulis file base64.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-22"
    owasp: "A01:2021"
    ojs_versions_affected: "<= 3.4.0-3, <= 3.3.0-15"
    cve_references:
      - "CVE-2023-47271"
    taint_analysis:
      sources:
        - "$n->textContent"
      sinks:
        - "file_put_contents"
      sanitizers:
        - "preg_replace"
    pattern_match:
      type: "regex"
      patterns:
        - "\\$coverImage\\[['\"]uploadName['\"]\\]\\s*=\\s*(?:uniqid\\(\\)\\s*\
          \\.\\s*['\"]-['\"]\\s*\\.\\s*basename\\s*\\()?.*\\$n->textContent"
        - "file_put_contents\\s*\\(\\s*\\$filePath\\s*,\\s*base64_decode\\s*\\(\
          .*\\$n->textContent\\s*\\)"
    remediation: >
      Terapkan regex ketat untuk membersihkan format file seperti
      preg_replace("/[^a-z0-9\.\-]+/", "", ...) ditambah penggantian spasi.
    false_positive_notes: >
      Penamaan file melewati pencocokan whitelist reguler yang ketat dan
      memeriksa ekstensi.
    references:
      - "https://github.com/pkp/pkp-lib/issues/9464"

  - id: "OJS-SC-CVE-006"
    name: "CVE-2023-5903 - Stored XSS in Section Title"
    description: >
      Pemanggilan variabel judul subseksi ($section->getLocalizedTitle()) yang
      disimpan pengguna dengan tingkat  hak akses tinggi dimasukkan langsung ke
      tag translasi (Smarty {translate}) tanpa modifier escaping HTML.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    ojs_versions_affected: "< 3.3.0-16"
    cve_references:
      - "CVE-2023-5903"
    pattern_match:
      type: "regex"
      patterns:
        - "name=\\$section->getLocalizedTitle\\(\\)(?!\\|escape|\\|strip_unsafe\
          _html)"
    remediation: >
      Tambahkan pemodifikasi `|escape` di dalam tag fungsi {translate}:
      name=$section->getLocalizedTitle()|escape.
    false_positive_notes: >
      Variabel lolos proses escape dari layer controller PHP sebelum ditransfer
      ke template.
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2023-5903"

  - id: "OJS-SC-CVE-007"
    name: "CVE-2023-5626 - CSRF in Payment Types Form"
    description: >
      Konstruktor form pada berkas PaymentTypesForm.inc.php tidak
      mengimplementasikan FormValidatorCSRF,  memungkinkan pengubahan jenis dan
      sistem pembayaran lewat teknik *forged requests*.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-352"
    owasp: "A01:2021"
    ojs_versions_affected: "< 3.3.0-16"
    cve_references:
      - "CVE-2023-5626"
    pattern_match:
      type: "regex"
      patterns:
        - "(?s)public\\s+function\\s+__construct\\s*\\(\\s*\\)\\s*\\{(?:(?!Form\
          ValidatorCSRF).)*?manager\\.payment\\.form\\.numeric"
    remediation: >
      Tambahkan pemeriksa token pada saat form inisialisasi: $this->addCheck(new
      FormValidatorCSRF($this));.
    false_positive_notes: >
      Bila Form dirancang semata-mata khusus instruksi pencarian HTTP GET
      (bersifat read-only).
    references:
      - "https://huntr.dev/bounties/c99279c1-709a-4e7b-a042-010c2bb44d6b"

  - id: "OJS-SC-CVE-008"
    name: "CVE-2019-19909 - Deserialization of Untrusted Data in Report Generator"
    description: >
      Input kontrol pada variabel 'filters' dan 'orderBy' diambil dari parameter
      URL  dan diproses langsung menggunakan PHP unserialize(), membuka jalan
      untuk Remote Code Execution (RCE) via injeksi objek PHP.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-502"
    owasp: "A08:2021"
    ojs_versions_affected: "< 3.1.2-2"
    cve_references:
      - "CVE-2019-19909"
    taint_analysis:
      sources:
        - "$request->getUserVar('filters')"
        - "$request->getUserVar('orderBy')"
      sinks:
        - "unserialize"
      sanitizers:
        - "json_decode"
    pattern_match:
      type: "regex"
      patterns:
        - "unserialize\\s*\\(\\s*\\$request->getUserVar\\s*\\("
        - "unserialize\\s*\\(\\s*\\$orderBy\\s*\\)"
    remediation: >
      Ganti fungsionalitas serialize/unserialize menjadi fungsi pertukaran
      format yang aman yakni json_encode dan json_decode.
    false_positive_notes: >
      Fungsi unserialize() dikenakan hanya pada output hasil query dari database
      yang dipastikan ketat tidak mungkin dimanipulasi dari parameter end-user.
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2019-19909"

  - id: "OJS-SC-CVE-009"
    name: "CVE-2025-13469 - Stored XSS in Manual Payment Instructions"
    description: >
      Variabel manualInstructions di sisi front-end sistem pembayaran manual
      hanya menetralkan format  baris menggunakan `|nl2br` tanpa mensterilkan
      skrip HTML, menyebabkan Stored XSS.
    severity: "LOW"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    ojs_versions_affected: "3.3.0, 3.4.0, 3.5.0"
    cve_references:
      - "CVE-2025-13469"
    pattern_match:
      type: "regex"
      patterns:
        - "\\{\\$manualInstructions\\|nl2br\\}(?!.*strip_unsafe_html|.*escape)"
    remediation: >
      Tambahkan string modifier strip_unsafe_html sebelum variabel diputus
      barisnya di file paymentForm.tpl:
      {$manualInstructions|strip_unsafe_html|nl2br}.
    false_positive_notes: >
      Nilai input manualInstructions ini telah terjamin di-sanitize aman oleh
      layer Controller di server.
    references:
      - "https://github.com/pkp/pkp-lib/issues/12022"

  - id: "OJS-SC-CVE-010"
    name: "CVE-2023-5894 - Stored XSS in Issue Title (Edit Modal)"
    description: >
      Judul issue (getIssueIdentification) ditranslasikan dalam fungsi helper
      OJS secara langsung  tanpa disanitasi yang dapat memicu eksekusi payload
      Javascript pada 'Edit Modal' panel pengelola jurnal.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    ojs_versions_affected: "< 3.3.0-16 and 3.4.0-x < 3.4.0-4"
    cve_references:
      - "CVE-2023-5894"
    taint_analysis:
      sources:
        - "$issue->getIssueIdentification()"
      sinks:
        - "__()"
      sanitizers:
        - "htmlspecialchars"
    pattern_match:
      type: "regex"
      patterns:
        - "__\\s*\\(\\s*['\"]editor\\.issues\\.editIssue['\"]\\s*,\\s*(?:array\
          \\(|\\[)\\s*['\"]issueIdentification['\"]\\s*=>\\s*\\$issue->getIssue\
          Identification\\(\\)\\s*(?:\\)|\\])\\s*\\)"
    remediation: >
      Kunci string terjemahan secara eksplisit di dalam fungsi
      htmlspecialchars() sebelum diletakkan pada array substitusi terjemahan.
    false_positive_notes: >
      Data input dipastikan hanyalah angka ID (integer) atau hardcoded string
      yang aman.
    references:
      - "https://huntr.com/bounties/aba3ba5b-aa6b-4076-b663-4237b4a0761d"

  - id: "OJS-SC-CVE-011"
    name: "CVE-2018-12229 - Reflected XSS in Search Page"
    description: >
      Form pencarian mengekspos Reflected XSS lewat parameter 'authors' dari URL
      GET  yang diselipkan ke properti value dalam atribut tag HTML `<input>` di
      smarty tanpa tag pelepasan karakter.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    ojs_versions_affected: "3.0.0 - 3.1.1-1"
    cve_references:
      - "CVE-2018-12229"
    pattern_match:
      type: "regex"
      patterns:
        - "value=\\s*['\"]\\{\\$authors\\}['\"](?!.*escape)"
    remediation: >
      Sanitasi output template smarty `search.tpl` pada field pencarian dengan
      menyematkan variabel escape: value="{$authors|escape}".
    false_positive_notes: >
      Paramater ter-escape secara logikal pada bahasa pemrograman PHP back-end
      sebelum dioper ke instance object Smarty.
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2018-12229"
      - "https://github.com/pkp/pkp-lib/issues/3785"
