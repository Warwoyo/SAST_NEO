rules:
  - id: "OJS-SC-PLUGIN-001"
    name: "Plugin loading without validation"
    description: >
      OJS plugin loading does not validate the plugin source or integrity,
      allowing potentially malicious plugins to be loaded.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-829"
    owasp: "A08:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'PluginRegistry::loadPlugin\s*\(.*?\$'
        - 'import\s*\(\s*["\'']plugins\.'
    remediation: >
      Validate plugin integrity using checksums before loading.
      Only load plugins from the official OJS plugin gallery.

  - id: "OJS-SC-PLUGIN-002"
    name: "Plugin with unrestricted file operations"
    description: >
      An OJS plugin performs file operations without restricting paths
      to the designated plugin directory.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-22"
    owasp: "A01:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'class\s+\w+Plugin.*?(fopen|file_put_contents|unlink|rename)\s*\('
    remediation: >
      Restrict all plugin file operations to the plugin's own directory.
      Use OJS file management APIs.

  - id: "OJS-SC-PLUGIN-003"
    name: "Plugin executing arbitrary code"
    description: >
      An OJS plugin uses eval(), assert(), or create_function()
      which can execute arbitrary code.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-94"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'class\s+\w+Plugin.*?(eval|assert|create_function)\s*\('
    remediation: >
      Remove dynamic code execution from plugins.
      Use proper class methods and configuration.
