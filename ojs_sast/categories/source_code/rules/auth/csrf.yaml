rules:
  - id: "OJS-SC-CSRF-001"
    name: "Form POST missing Smarty {csrf} token"
    description: >
      A form with method="post" is defined in the template, but
      manual  verification is needed to ensure the {csrf} Smarty tag is present
      inside the form.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "auth"
    cwe: "CWE-352"
    owasp: "A01:2021"
    include_paths:
      - "**/*.tpl"
    pattern_match:
      type: "regex"
      patterns:
        - "<form[^>]+method=[\"']post[\"'][^>]*>"
    remediation: >
      Ensure that the Smarty template function {csrf} is included inside  all
      <form method="post"> blocks to prevent CSRF attacks.

  - id: "OJS-SC-CSRF-002"
    name: "State-changing operation directly from request variables"
    description: >
      A Handler might be performing state-changing operations (delete, update)
      using request parameters without verifying the HTTP method (POST).
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "auth"
    cwe: "CWE-352"
    owasp: "A01:2021"
    include_paths:
      - "**/*Handler.inc.php"
    pattern_match:
      type: "regex"
      patterns:
        - "\\$request->getUserVar\\([^\\)]+\\).*?(?:\\n.*?){0,5}->(?:delete|upd\
          ate|remove)[a-zA-Z]*\\("
    remediation: >
      Use $request->isPost() to ensure state-changing operations are
      only  executed via HTTP POST requests. Combine this with CSRF token
      validation.

  - id: "OJS-SC-CSRF-003"
    name: "OJS handler missing CSRF check"
    description: >
      An OJS handler method that modifies data does not call the CSRF validation
      method or authorization policy before processing.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "auth"
    cwe: "CWE-352"
    owasp: "A01:2021"
    exclude_paths:
      - "**/*DAO.inc.php"
      - "**/classes/**"
      - "**/*Form.inc.php"
    include_paths:
      - "**/*Handler.inc.php"
    pattern_match:
      type: "regex"
      patterns:
        - "function\\s+(save|delete|update|remove|insert)\\w*\\s*\\(\\$args,\\s\
          *(?:&)?\\$request\\)"
    remediation: >
      Ensure that all Handler methods modifying data invoke
      $this->validate(),  $request->checkCSRF(), or rely on strict Role-Based
      Authorization Policies  before executing database operations. DO NOT add
      CSRF checks in DAO files.
