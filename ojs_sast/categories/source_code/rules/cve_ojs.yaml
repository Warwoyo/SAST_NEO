rules:
  # ==============================================================================
  # OJS EXTENDED SAST — SOURCE CODE VULNERABILITY RULESET  (v3.0)
  # ==============================================================================
  # Coverage   : 14 CVEs (CVE-2018 through CVE-2025) → 19 detection rules
  # Scope      : PHP source code, Smarty .tpl templates
  # Language   : English
  # Pattern    : Regex / Tree-sitter AST (PHP grammar)
  # Author     : Extended SAST Research — Putu Divakara Mataram
  # Framework  : OJS-aware (PKP-WAL MVC routing, Smarty templating,
  #              Illuminate DB query builder, FormValidator system)
  # ==============================================================================
  # CHANGELOG (v2.0 → v3.0):
  #   - Added 2 CVEs (CVE-2024-25438 / CVE-2024-25436) backed by verifiable
  #     PKP commit a0485a5 in pkp/pkp-lib (issue #9396).
  #   - Split rules whose JSON entry contains multiple `version_group` items
  #     into one rule per relevant version branch. Suffix convention:
  #         -V33     → branch stable-3_3_0 (OJS 3.3.x family)
  #         -V34V35  → branches stable-3_4_0 + stable-3_5_0 (sharing same diff)
  #         -A / -B  → split by *file* (when one CVE covers two distinct files)
  #     Rationale: SAST engines select the rule matching the codebase version,
  #     reducing false positives (path globs that don't exist on disk) and
  #     false negatives (different syntax shape between OJS branches).
  #   - Single-version_group CVEs keep their original rule id unchanged for
  #     backward compatibility (003, 005, 006, 007, 009, 011, 012).
  # ==============================================================================
  # Rule index:
  #   OJS-SC-CVE-001-V33      CVE-2025-67890   Path Traversal (NativeXmlIssueGalleyFilter, .inc.php)
  #   OJS-SC-CVE-001-V34V35   CVE-2025-67890   Path Traversal (NativeXmlIssueGalleyFilter, .php)
  #   OJS-SC-CVE-002-V33      CVE-2025-67893   LESS Code Injection (DefaultThemePlugin, 3.3.x)
  #   OJS-SC-CVE-002-V34V35   CVE-2025-67893   LESS Code Injection (DefaultThemePlugin, 3.4.x/3.5.x)
  #   OJS-SC-CVE-003          CVE-2025-67889   SQL Injection (Institution Collector)
  #   OJS-SC-CVE-004-V33      CVE-2025-67892   Login CSRF (Validation.inc.php)
  #   OJS-SC-CVE-004-V34V35   CVE-2025-67892   Login CSRF (Validation.php)
  #   OJS-SC-CVE-005          CVE-2023-47271   RCE via XML cover_image (NativeXmlPublicationFilter)
  #   OJS-SC-CVE-006          CVE-2023-5903    Stored XSS (submissions.tpl section title)
  #   OJS-SC-CVE-007          CVE-2023-5626    CSRF (PaymentTypesForm constructor)
  #   OJS-SC-CVE-008-A        CVE-2019-19909   PHP Object Injection (PKPToolsHandler)
  #   OJS-SC-CVE-008-B        CVE-2019-19909   PHP Object Injection (PKPStatisticsHelper)
  #   OJS-SC-CVE-009          CVE-2025-13469   Stored XSS (manualInstructions, .tpl)
  #   OJS-SC-CVE-010-V33      CVE-2023-5894    Stored XSS (Issue grid, array() syntax)
  #   OJS-SC-CVE-010-V34V35   CVE-2023-5894    Stored XSS (Issue grid, [] syntax)
  #   OJS-SC-CVE-011          CVE-2018-12229   Reflected XSS (search.tpl)
  #   OJS-SC-CVE-012          CVE-2022-26616   Host Header Injection (PKPRequest)
  #   OJS-SC-CVE-013          CVE-2024-25438   Stored XSS (QueryTitleGridColumn, Submission stage)
  #   OJS-SC-CVE-014          CVE-2024-25436   Stored XSS (QueryTitleGridColumn, Production stage)
  # ==============================================================================

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-001-V33 | CVE-2025-67890 | CWE-22 | HIGH
  # Path Traversal in NativeXmlIssueGalleyFilter — OJS 3.3.x branch (.inc.php)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-001-V33"
    name: "CVE-2025-67890 — Unsanitized XML Filename Assigned to setServerFileName (3.3.x)"
    description: >
      The Native XML Import/Export Plugin's NativeXmlIssueGalleyFilter reads the
      <file_name> XML child tag of <issue_file> via DOMElement->textContent and
      directly passes that raw string to $issueFile->setServerFileName() without any
      character sanitization. An authenticated Journal Editor or Production Editor
      can craft a malicious XML import archive containing path traversal sequences
      (e.g., "../../config.inc.php" or "../uploads/malicious.php") inside the
      <file_name> tag. When the import is executed, the raw input is used as the
      physical filename on the server, leading to arbitrary file overwrite. If the
      server is writable, this can be escalated to Remote Code Execution (RCE) by
      writing a PHP web shell to a publicly accessible directory. This rule
      variant targets the stable-3_3_0 branch specifically (file extension
      `.inc.php`); use the V34V35 variant for 3.4.x and 3.5.x.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-22"
    owasp: "A01:2021"
    confidence: "HIGH"
    ojs_branch: "stable-3_3_0"
    ojs_versions_affected: "<= 3.3.0-21 (patched in 3.3.0-22)"
    cve_references:
      - "CVE-2025-67890"
    scan_scope:
      file_paths:
        - "plugins/importexport/native/filter/NativeXmlIssueGalleyFilter.inc.php"
        - "lib/pkp/plugins/importexport/native/filter/NativeXmlIssueGalleyFilter.inc.php"
      target_functions:
        - "handleElement"
    taint_analysis:
      sources:
        - "$o->textContent"
        - "$node->textContent"
      sinks:
        - "setServerFileName()"
      sanitizers:
        - "preg_replace('/[^a-z0-9\\.\\-]+/', '', ...)"
        - "str_replace([' ', '_', ':'], '-', ...)"
        - "strtolower(...)"
        - "basename(...)"
      propagation_path: >
        XML <file_name> tag
          → DOMElement->textContent ($o->textContent)
          → [NO sanitization]
          → $issueFile->setServerFileName($o->textContent)
          → Physical file path used for write operation
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "Direct textContent assignment to setServerFileName in switch/case"
          query: >
            (expression_statement
              (member_call_expression
                name: (name) @method (#eq? @method "setServerFileName")
                arguments: (arguments
                  (argument
                    (member_access_expression
                      name: (name) @prop (#eq? @prop "textContent")
                    )
                  )
                )
              )
            )
        - description: "Regex — single-line case body (3.3.x style)"
          type: "regex"
          query: >
            case\s*['"]file_name['"]\s*:\s*\$issueFile->setServerFileName\s*\(\s*\$[a-zA-Z_]+->textContent\s*\)\s*;\s*break\s*;
    false_positive_conditions:
      - id: "FP-001-V33-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The textContent value is processed through BOTH preg_replace with strict
          allowlist pattern '/[^a-z0-9\\.\\-]+/' AND str_replace for space/underscore/
          colon normalization AND strtolower(), all chained before reaching
          setServerFileName(). All three transformations must be present in
          sequence (canonical patch from 3.3.0-22).
      - id: "FP-001-V33-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The filename is entirely system-generated (e.g., uniqid() or md5()) with no
          user-controlled characters incorporated into the value that reaches
          setServerFileName().
      - id: "FP-001-V33-C"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          Only basename() is applied without any additional regex allowlist.
          basename() alone provides incomplete protection; null-byte or special
          OS characters may bypass it depending on PHP version and OS.
    remediation: >
      Apply the canonical patch (3.3.0-22 style, tab indentation):
        case 'file_name':
          $issueFile->setServerFileName(trim(
            preg_replace(
              "/[^a-z0-9\\.\\-]+/",
              "",
              str_replace(
                [' ', '_', ':'],
                '-',
                strtolower($o->textContent)
              )
            )
          ));
          break;
    references:
      - "https://github.com/pkp/pkp-lib/issues/11973"
      - "http://karmainsecurity.com/KIS-2025-11"
      - "https://seclists.org/fulldisclosure/2025/Dec/33"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-001-V34V35 | CVE-2025-67890 | CWE-22 | HIGH
  # Path Traversal in NativeXmlIssueGalleyFilter — OJS 3.4.x / 3.5.x (.php)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-001-V34V35"
    name: "CVE-2025-67890 — Unsanitized XML Filename Assigned to setServerFileName (3.4.x / 3.5.x)"
    description: >
      Same vulnerability class as OJS-SC-CVE-001-V33 but targets the post-rename
      file path used in stable-3_4_0 and stable-3_5_0 (no `.inc.php` suffix), and
      matches the multi-line `case 'file_name':` body shape used in those
      branches (with the break statement on its own line).
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-22"
    owasp: "A01:2021"
    confidence: "HIGH"
    ojs_branch: "stable-3_4_0,stable-3_5_0"
    ojs_versions_affected: "<= 3.4.0-9 (patched in 3.4.0-10), <= 3.5.0-1 (patched in 3.5.0-2)"
    cve_references:
      - "CVE-2025-67890"
    scan_scope:
      file_paths:
        - "plugins/importexport/native/filter/NativeXmlIssueGalleyFilter.php"
        - "lib/pkp/plugins/importexport/native/filter/NativeXmlIssueGalleyFilter.php"
      target_functions:
        - "handleElement"
    taint_analysis:
      sources:
        - "$o->textContent"
        - "$node->textContent"
      sinks:
        - "setServerFileName()"
      sanitizers:
        - "preg_replace('/[^a-z0-9\\.\\-]+/', '', ...)"
        - "str_replace([' ', '_', ':'], '-', ...)"
        - "strtolower(...)"
        - "basename(...)"
      propagation_path: >
        XML <file_name> tag
          → DOMElement->textContent ($o->textContent)
          → [NO sanitization]
          → $issueFile->setServerFileName($o->textContent)
          → Physical file path used for write operation
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "Direct textContent assignment to setServerFileName in switch/case"
          query: >
            (expression_statement
              (member_call_expression
                name: (name) @method (#eq? @method "setServerFileName")
                arguments: (arguments
                  (argument
                    (member_access_expression
                      name: (name) @prop (#eq? @prop "textContent")
                    )
                  )
                )
              )
            )
        - description: "setServerFileName inside a match/switch arm (3.4.x/3.5.x style)"
          query: >
            (match_arm
              body: (expression_statement
                (member_call_expression
                  name: (name) @method (#eq? @method "setServerFileName")
                  arguments: (arguments
                    (argument
                      (member_access_expression
                        name: (name) @prop (#eq? @prop "textContent")
                      )
                    )
                  )
                )
              )
            )
        - description: "Regex — multi-line case body (3.4.x/3.5.x style with break on next line)"
          type: "regex"
          query: >
            case\s*['"]file_name['"]\s*:\s*\$issueFile->setServerFileName\s*\(\s*\$[a-zA-Z_]+->textContent\s*\)\s*;\s*\n\s*break\s*;
    false_positive_conditions:
      - id: "FP-001-V34V35-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The textContent value is processed through preg_replace
          ('/[^a-z0-9\\.\\-]+/'), str_replace for space/underscore/colon, and
          strtolower(), all chained before reaching setServerFileName().
          Canonical patch from 3.4.0-10 / 3.5.0-2 (4-space indentation).
      - id: "FP-001-V34V35-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The filename is entirely system-generated with no user-controlled
          characters in the sink argument.
      - id: "FP-001-V34V35-C"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          Only basename() is applied without the regex allowlist.
    remediation: >
      Apply the canonical patch (3.4.0-10 / 3.5.0-2 style, 4-space indentation):
        case 'file_name':
            $issueFile->setServerFileName(trim(
                preg_replace(
                    "/[^a-z0-9\\.\\-]+/",
                    "",
                    str_replace(
                        [' ', '_', ':'],
                        '-',
                        strtolower($o->textContent)
                    )
                )
            ));
            break;
    references:
      - "https://github.com/pkp/pkp-lib/issues/11973"
      - "http://karmainsecurity.com/KIS-2025-11"
      - "https://seclists.org/fulldisclosure/2025/Dec/33"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-002-V33 | CVE-2025-67893 | CWE-94 | HIGH
  # LESS Code Injection via baseColour — OJS 3.3.x (.inc.php; saveOption override)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-002-V33"
    name: "CVE-2025-67893 — Unsanitized baseColour Injected into LESS (3.3.x)"
    description: >
      The DefaultThemePlugin reads the 'baseColour' value from the Theme Settings
      API via $this->getOption('baseColour') and concatenates it directly into a
      LESS variable string later passed to the Less_Parser engine. The 3.3.x
      patch landed in 3.3.0-22 and introduced TWO defenses:
        (1) a saveOption() override that rejects non-hex input at persistence
            time (returns null when preg_match fails), and
        (2) an init()-time fallback to the default '#1E6292' when getOption
            returns a non-hex value.
      This rule variant scans the stable-3_3_0 branch (`.inc.php` extension)
      and validates that BOTH defenses are present.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-94"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_branch: "stable-3_3_0"
    ojs_versions_affected: "<= 3.3.0-21 (patched in 3.3.0-22)"
    cve_references:
      - "CVE-2025-67893"
    scan_scope:
      file_paths:
        - "plugins/themes/default/DefaultThemePlugin.inc.php"
      target_functions:
        - "init"
        - "saveOption"
    taint_analysis:
      sources:
        - "$this->getOption('baseColour')"
        - "$baseColour"
      sinks:
        - "$additionalLessVariables[]"
        - "Less_Parser::parse()"
        - "PKPTemplateManager::compileLess()"
      sanitizers:
        - "preg_match('/^#[0-9a-fA-F]{1,6}$/', $value)"
      propagation_path: >
        Theme Settings API POST (baseColour param)
          → saveOption() stores raw value in DB (3.3.x: vulnerable if no override)
          → init() retrieves: $this->getOption('baseColour')
          → string concatenation: '@bg-base:' . $this->getOption('baseColour') . ';'
          → appended to $additionalLessVariables[]
          → Less_Parser::parse($additionalLessVariables) — code injection
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "Direct getOption result concatenated into LESS variable string"
          query: >
            (expression_statement
              (assignment_expression
                left: (subscript_expression
                  object: (variable_name) @var
                  (#match? @var "\\$additionalLessVariables")
                )
                right: (binary_expression
                  operator: "."
                  (member_call_expression
                    object: (variable_name) @this (#eq? @this "$this")
                    name: (name) @method (#eq? @method "getOption")
                  )
                )
              )
            )
        - description: "Regex — getOption result concatenated without prior preg_match guard"
          type: "regex"
          query: >
            \$additionalLessVariables\[\]\s*=\s*['"]@[a-z\-]+:\s*['"]\s*\.\s*\$this->getOption\s*\(\s*['"]baseColour['"]\s*\)
    false_positive_conditions:
      - id: "FP-002-V33-A"
        verdict: "SAFE — suppress alert"
        condition: >
          Both defenses present in the 3.3.x file: (1) a saveOption() override
          that runs preg_match('/^#[0-9a-fA-F]{1,6}$/', $value) and assigns
          null on failure, AND (2) init() falls back to '#1E6292' when the
          retrieved baseColour fails the same regex BEFORE concatenation into
          $additionalLessVariables[].
      - id: "FP-002-V33-B"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          Only init()-time validation is present without a saveOption() override.
          The DB still stores attacker-controlled raw input, which is risky
          if any other code path reads baseColour without re-validation.
    remediation: >
      Apply both 3.3.0-22 patches in DefaultThemePlugin.inc.php:
        // Override save:
        public function saveOption($name, $value, $contextId = null) {
            if ($name === 'baseColour' && !preg_match('/^#[0-9a-fA-F]{1,6}$/', $value)) {
                $value = null;
            }
            return parent::saveOption($name, $value, $contextId);
        }
        // In init():
        $baseColour = $this->getOption('baseColour');
        if (!preg_match('/^#[0-9a-fA-F]{1,6}$/', $baseColour)) {
            $baseColour = '#1E6292';
        }
        $additionalLessVariables[] = '@bg-base:' . $baseColour . ';';
    references:
      - "https://github.com/pkp/pkp-lib/issues/11974"
      - "http://karmainsecurity.com/KIS-2025-12"
      - "https://seclists.org/fulldisclosure/2025/Dec/34"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-002-V34V35 | CVE-2025-67893 | CWE-94 | HIGH
  # LESS Code Injection via baseColour — OJS 3.4.x / 3.5.x (.php)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-002-V34V35"
    name: "CVE-2025-67893 — Unsanitized baseColour Injected into LESS (3.4.x / 3.5.x)"
    description: >
      Same vulnerability class as OJS-SC-CVE-002-V33 but targets the
      post-rename file path used in stable-3_4_0 and stable-3_5_0 (no
      `.inc.php` suffix). On these branches the canonical fix only requires
      the init()-time preg_match guard that falls back to '#1E6292' before
      concatenation, because saveOption persistence in 3.4.0+ already
      delegates to a context settings API that revalidates input.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-94"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_branch: "stable-3_4_0,stable-3_5_0"
    ojs_versions_affected: "<= 3.4.0-9 (patched in 3.4.0-10), <= 3.5.0-1 (patched in 3.5.0-2)"
    cve_references:
      - "CVE-2025-67893"
    scan_scope:
      file_paths:
        - "plugins/themes/default/DefaultThemePlugin.php"
      target_functions:
        - "init"
    taint_analysis:
      sources:
        - "$this->getOption('baseColour')"
        - "$baseColour"
      sinks:
        - "$additionalLessVariables[]"
        - "Less_Parser::parse()"
      sanitizers:
        - "preg_match('/^#[0-9a-fA-F]{1,6}$/', $value)"
      propagation_path: >
        getOption('baseColour')
          → [if no preg_match guard] string concatenation into LESS variable
          → Less_Parser::parse() — code injection
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "getOption result concatenated into LESS variable in init()"
          query: >
            (expression_statement
              (assignment_expression
                left: (subscript_expression
                  object: (variable_name) @var
                  (#match? @var "\\$additionalLessVariables")
                )
                right: (binary_expression
                  operator: "."
                  (member_call_expression
                    object: (variable_name) @this (#eq? @this "$this")
                    name: (name) @method (#eq? @method "getOption")
                  )
                )
              )
            )
        - description: "Regex — concatenation without prior preg_match guard"
          type: "regex"
          query: >
            \$additionalLessVariables\[\]\s*=\s*['"]@[a-z\-]+:\s*['"]\s*\.\s*\$this->getOption\s*\(\s*['"]baseColour['"]\s*\)
    false_positive_conditions:
      - id: "FP-002-V34V35-A"
        verdict: "SAFE — suppress alert"
        condition: >
          init() validates the retrieved baseColour with
          preg_match('/^#[0-9a-fA-F]{1,6}$/', ...) AND falls back to a
          hardcoded default when the regex fails BEFORE the value is
          concatenated into $additionalLessVariables[].
      - id: "FP-002-V34V35-B"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          Only a non-empty / null check is performed instead of the hex
          regex. Length and emptiness checks do not prevent LESS injection.
    remediation: >
      Apply the canonical 3.4.0-10 / 3.5.0-2 patch:
        $baseColour = $this->getOption('baseColour');
        if (!preg_match('/^#[0-9a-fA-F]{1,6}$/', $baseColour)) {
            $baseColour = '#1E6292';
        }
        $additionalLessVariables[] = '@bg-base:' . $baseColour . ';';
    references:
      - "https://github.com/pkp/pkp-lib/issues/11974"
      - "http://karmainsecurity.com/KIS-2025-12"
      - "https://seclists.org/fulldisclosure/2025/Dec/34"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-003 | CVE-2025-67889 | CWE-89 | HIGH
  # SQL Injection (Boolean/Time-based) via searchPhrase in Institution Collector
  # JSON has 1 version_group (3.4.0-10 & 3.5.0-2 share identical patch) → 1 rule
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-003"
    name: "CVE-2025-67889 — Raw Variable Interpolation in DB::raw() within Institution Collector"
    description: >
      The Institution Collector (classes/institution/Collector.php) processes the
      'searchPhrase' GET parameter from the Institutions API endpoint
      (.../api/v1/institutions). The input is split by whitespace using explode(),
      and each token ($word) is escaped with addcslashes($word, '%_') to prevent
      LIKE-wildcard injection. However, addcslashes() alone is insufficient because
      $word is then interpolated directly into a DB::raw() call using PHP double-
      quoted string interpolation ("lower('%{$word}%')"), bypassing Laravel's
      parameterized query binding. This enables blind boolean-based or time-based
      SQL injection by an authenticated Journal Editor or Production Editor who
      has access to the Institutions API endpoint.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-89"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_branch: "stable-3_4_0,stable-3_5_0"
    ojs_versions_affected: "<= 3.4.0-9, <= 3.5.0-1 (institution module not present in 3.3.x)"
    cve_references:
      - "CVE-2025-67889"
    scan_scope:
      file_paths:
        - "classes/institution/Collector.php"
        - "lib/pkp/classes/institution/Collector.php"
      target_functions:
        - "getQueryBuilder"
    taint_analysis:
      sources:
        - "$this->searchPhrase"
        - "$word"
      sinks:
        - "DB::raw()"
      sanitizers:
        - "$pdo->quote('%{$word}%')"
        - "(int) $var"
      propagation_path: >
        GET /api/v1/institutions?searchPhrase=...
          → $this->searchPhrase
          → explode(' ', $this->searchPhrase) → $words[]
          → foreach $word = addcslashes($word, '%_')
          → DB::raw("lower('%{$word}%')") — SQL injection via double-quote interpolation
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "Variable interpolated inside DB::raw() using PHP encapsed string"
          query: >
            (scoped_call_expression
              scope: (name) @scope (#eq? @scope "DB")
              name: (name) @method (#eq? @method "raw")
              arguments: (arguments
                (argument
                  (encapsed_string
                    (variable_name)
                  )
                ) @sink
              )
            )
        - description: "String concatenation with user variable as right operand in DB::raw"
          query: >
            (scoped_call_expression
              scope: (name) @scope (#eq? @scope "DB")
              name: (name) @method (#eq? @method "raw")
              arguments: (arguments
                (argument
                  (binary_expression
                    operator: "."
                    right: [(variable_name) (member_call_expression) (scoped_call_expression)]
                  )
                ) @sink
              )
            )
        - description: "String concatenation with user variable as left operand in DB::raw"
          query: >
            (scoped_call_expression
              scope: (name) @scope (#eq? @scope "DB")
              name: (name) @method (#eq? @method "raw")
              arguments: (arguments
                (argument
                  (binary_expression
                    operator: "."
                    left: [(variable_name) (member_call_expression)]
                  )
                ) @sink
              )
            )
    false_positive_conditions:
      - id: "FP-003-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The variable inside DB::raw() is explicitly wrapped with $pdo->quote()
          before being passed to DB::raw(), e.g.,
          DB::raw("lower(" . $pdo->quote("%{$word}%") . ")"). Canonical patch
          applied in 3.4.0-10 and 3.5.0-2.
      - id: "FP-003-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The variable inside DB::raw() is explicitly cast to integer prior to
          interpolation (e.g., (int) $var).
      - id: "FP-003-C"
        verdict: "SAFE — suppress alert"
        condition: >
          The DB::raw() call uses only hardcoded string literals with no user
          variable interpolation (e.g., DB::raw('NOW()')).
      - id: "FP-003-D"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          addcslashes() or similar string-escaping is applied but the variable
          is still interpolated via PHP double-quote encapsed string inside
          DB::raw(). addcslashes('%_') only escapes LIKE wildcards.
    remediation: >
      Replace direct variable interpolation inside DB::raw() with PDO-level quoting:
        $pdo = DB::connection()->getPdo();
        ->where(DB::raw('lower(col)'), 'LIKE',
                DB::raw('lower(' . $pdo->quote("%{$word}%") . ')'));
    references:
      - "https://github.com/pkp/pkp-lib/issues/11977"
      - "http://karmainsecurity.com/KIS-2025-10"
      - "https://karmainsecurity.com/pocs/CVE-2025-67889.php"
      - "https://seclists.org/fulldisclosure/2025/Dec/32"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-004-V33 | CVE-2025-67892 | CWE-352 | MEDIUM
  # Login CSRF — Validation::login() missing checkCSRF (3.3.x .inc.php)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-004-V33"
    name: "CVE-2025-67892 — Login Handler Missing Anti-CSRF Token Validation (3.3.x)"
    description: >
      Validation::login() in classes/security/Validation.inc.php (3.3.x) processes
      login POSTs without validating the CSRF token. In the 3.3.x branch, the
      canonical fix inserts $request->checkCSRF() BEFORE the
      `if ($user->getAuthId())` block (around line 35 in the unpatched file).
      This allows account fixation, privilege escalation, or unauthorized
      session hijacking via cross-origin forged login POST.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-352"
    owasp: "A01:2021"
    confidence: "MEDIUM"
    ojs_branch: "stable-3_3_0"
    ojs_versions_affected: "<= 3.3.0-21 (patched in 3.3.0-22)"
    cve_references:
      - "CVE-2025-67892"
    scan_scope:
      file_paths:
        - "classes/security/Validation.inc.php"
        - "lib/pkp/classes/security/Validation.inc.php"
      target_functions:
        - "login"
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "static login() function body with credential logic but no checkCSRF call"
          query: >
            (function_definition
              name: (name) @fn (#eq? @fn "login")
              body: (compound_statement) @body
              (#not-match? @body "checkCSRF")
            )
        - description: "Regex — 3.3.x style: login method touching getAuthId without checkCSRF"
          type: "regex"
          query: >
            (?s)public\s+static\s+function\s+login\s*\(.*?\)\s*\{(?:(?!checkCSRF).)*?getAuthId
    false_positive_conditions:
      - id: "FP-004-V33-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The method body contains a call to $request->checkCSRF() (or
          equivalent) BEFORE the `$user->getAuthId()` block. The call must be
          on the request object obtained via Application::get()->getRequest()
          or Registry::get('request') (the 3.3.x bootstrap shape).
      - id: "FP-004-V33-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The login endpoint is protected by a framework-level global CSRF
          middleware that intercepts ALL POST requests before dispatch.
      - id: "FP-004-V33-C"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          A nonce/token is checked but only AFTER credential verification, or
          the check returns true when the token parameter is absent.
    remediation: >
      In the 3.3.x file, add the CSRF guard immediately at the top of login(),
      before the getAuthId branch:
        $request = Application::get()->getRequest();
        if (!$request->checkCSRF()) {
            return false;
        }
    references:
      - "https://github.com/pkp/pkp-lib/issues/11978"
      - "http://karmainsecurity.com/KIS-2025-14"
      - "https://seclists.org/fulldisclosure/2025/Dec/36"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-004-V34V35 | CVE-2025-67892 | CWE-352 | MEDIUM
  # Login CSRF — Validation::login() missing checkCSRF (3.4.x / 3.5.x .php)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-004-V34V35"
    name: "CVE-2025-67892 — Login Handler Missing Anti-CSRF Token Validation (3.4.x / 3.5.x)"
    description: >
      Same vulnerability class as OJS-SC-CVE-004-V33 but for the renamed file
      `Validation.php` used in stable-3_4_0 and stable-3_5_0. In these branches
      the function body shape is different: the canonical fix inserts
      $request->checkCSRF() BEFORE the `// Validate against user database`
      / verifyPassword block (around line 53 in 3.4.x and 68 in 3.5.x).
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-352"
    owasp: "A01:2021"
    confidence: "MEDIUM"
    ojs_branch: "stable-3_4_0,stable-3_5_0"
    ojs_versions_affected: "<= 3.4.0-9, <= 3.5.0-1"
    cve_references:
      - "CVE-2025-67892"
    scan_scope:
      file_paths:
        - "classes/security/Validation.php"
        - "lib/pkp/classes/security/Validation.php"
      target_functions:
        - "login"
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "static login() function body with credential logic but no checkCSRF call"
          query: >
            (function_definition
              name: (name) @fn (#eq? @fn "login")
              body: (compound_statement) @body
              (#not-match? @body "checkCSRF")
            )
        - description: "Regex — 3.4.x/3.5.x style: login method touching verifyPassword without checkCSRF"
          type: "regex"
          query: >
            (?s)public\s+static\s+function\s+login\s*\(.*?\)\s*\{(?:(?!checkCSRF).)*?(?:verifyPassword|getPassword)
    false_positive_conditions:
      - id: "FP-004-V34V35-A"
        verdict: "SAFE — suppress alert"
        condition: >
          $request->checkCSRF() is called BEFORE any verifyPassword /
          getPassword call. The call must be on the request object obtained
          via Application::get()->getRequest().
      - id: "FP-004-V34V35-B"
        verdict: "SAFE — suppress alert"
        condition: >
          Stateless token-based authentication (HTTP Bearer JWT) only — no
          cookie-based sessions.
      - id: "FP-004-V34V35-C"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          A token check exists but is bypassable when the token parameter is
          absent (returns true on missing parameter).
    remediation: >
      In Validation.php, add the CSRF guard immediately at the top of login(),
      before the verifyPassword call:
        $request = Application::get()->getRequest();
        if (!$request->checkCSRF()) {
            return false;
        }
    references:
      - "https://github.com/pkp/pkp-lib/issues/11978"
      - "http://karmainsecurity.com/KIS-2025-14"
      - "https://seclists.org/fulldisclosure/2025/Dec/36"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-005 | CVE-2023-47271 | CWE-22 | CRITICAL
  # RCE via Path Traversal in NativeImportExportPlugin (single version_group)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-005"
    name: "CVE-2023-47271 — XML <cover_image> Tag Leads to Arbitrary File Write via file_put_contents"
    description: >
      The Native Import/Export Plugin's parsePublicationCover() function reads the
      <cover_image> XML tag content ($n->textContent) and stores it as the upload
      filename in $coverImage['uploadName'] without adequate sanitization. When
      processing the corresponding <embed> tag, the plugin constructs a file path
      by appending this unsanitized filename to the public context files directory
      and writes the base64-decoded file content via file_put_contents(). An
      authenticated Journal Editor or Production Editor can supply a crafted XML
      package with a <cover_image> containing path traversal sequences, causing
      arbitrary file creation or overwrite anywhere the web server user has write
      access. If a PHP file is written to the web root, this results in full RCE.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-22"
    owasp: "A01:2021"
    confidence: "HIGH"
    ojs_versions_affected: "<= 3.4.0-3, <= 3.3.0-15"
    cve_references:
      - "CVE-2023-47271"
    scan_scope:
      file_paths:
        - "plugins/importexport/native/filter/PKPNativeFilterHelper.php"
        - "plugins/importexport/native/filter/NativeXmlPublicationFilter.inc.php"
        - "plugins/importexport/native/filter/NativeXmlPublicationFilter.php"
        - "lib/pkp/plugins/importexport/native/filter/PKPNativeFilterHelper.php"
        - "lib/pkp/plugins/importexport/native/filter/NativeXmlPublicationFilter.inc.php"
        - "lib/pkp/plugins/importexport/native/filter/NativeXmlPublicationFilter.php"
      target_functions:
        - "parsePublicationCover"
    taint_analysis:
      sources:
        - "$n->textContent"
        - "$coverImage['uploadName']"
      sinks:
        - "file_put_contents()"
      sanitizers:
        - "preg_replace('/[^a-z0-9\\.\\-]+/', '', ...)"
        - "str_replace([' ', '_', ':'], '-', ...)"
        - "strtolower(...)"
        - "basename(...)"
        - "uniqid()"
      propagation_path: >
        XML <cover_image> tag
          → $n->textContent
          → $coverImage['uploadName'] = $n->textContent (VULNERABLE)
            OR $coverImage['uploadName'] = uniqid() . '-' . basename($n->textContent) (PARTIAL)
          → $filePath = $contextFilesPath . '/' . $coverImage['uploadName']
          → file_put_contents($filePath, base64_decode(...)) — arbitrary write
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "textContent assigned to uploadName array key without sanitization"
          query: >
            (expression_statement
              (assignment_expression
                left: (subscript_expression
                  object: (variable_name) @arr (#match? @arr "\\$coverImage")
                  index: (string (string_value) @key (#eq? @key "uploadName"))
                )
                right: (member_access_expression
                  name: (name) @prop (#eq? @prop "textContent")
                )
              )
            )
        - description: "file_put_contents with a path variable derived from coverImage"
          query: >
            (function_call_expression
              function: (name) @fn (#eq? @fn "file_put_contents")
              arguments: (arguments
                (argument (variable_name) @path)
                (argument
                  (function_call_expression
                    function: (name) @decode (#eq? @decode "base64_decode")
                  )
                )
              )
            )
        - description: "Regex — both vulnerability patterns combined"
          type: "regex"
          query: >
            \$coverImage\[['"]uploadName['"]\]\s*=\s*(?!.*preg_replace)(?:uniqid\(\)\s*\.\s*['"]-['"]\s*\.\s*basename\s*\()?.*\$n->textContent
    false_positive_conditions:
      - id: "FP-005-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The $coverImage['uploadName'] assignment applies the FULL canonical
          chain: uniqid() prefix + basename() + preg_replace('/[^a-z0-9\\.\\-]+/', '')
          + str_replace for space/colon/underscore + strtolower(). All five
          transformations must be present.
      - id: "FP-005-B"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          Only basename() is applied (without the regex allowlist) to
          $n->textContent before assignment.
      - id: "FP-005-C"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          uniqid() prefix is present but $n->textContent is appended after only
          basename() without regex.
    remediation: >
      Apply the full sanitization chain:
        $coverImage['uploadName'] = uniqid() . '-' . basename(
          preg_replace('/[^a-z0-9\\.\\-]+/', '',
            str_replace([' ', '_', ':'], '-', strtolower($n->textContent))
          )
        );
    references:
      - "https://github.com/pkp/pkp-lib/issues/9464"
      - "http://karmainsecurity.com/KIS-2023-14"
      - "https://seclists.org/fulldisclosure/2023/Dec/23"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-006 | CVE-2023-5903 | CWE-79 | MEDIUM
  # Stored XSS — Smarty {translate} name param without |escape (single version_group)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-006"
    name: "CVE-2023-5903 — Stored XSS via Section Title in Smarty {translate} Tag"
    description: >
      The submissions.tpl template passes the localized section title, retrieved
      via $section->getLocalizedTitle(), directly as the 'name' parameter to the
      Smarty {translate} tag without the |escape modifier. A privileged user
      who can create or edit journal sections (e.g., Journal Manager) can inject
      an XSS payload into the section title field. The payload is stored in the
      database and executed in the victim's browser when the submissions page
      is rendered, constituting a Stored XSS attack targeting lower-privilege
      users who visit the page.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_versions_affected: "< 3.3.0-16"
    cve_references:
      - "CVE-2023-5903"
    scan_scope:
      file_paths:
        - "templates/frontend/pages/submissions.tpl"
        - "templates/frontend/**/*.tpl"
      target_context: "Smarty template {translate} tag with dynamic name parameter"
    pattern_match:
      type: "regex"
      patterns:
        - description: "getLocalizedTitle() in {translate} name param without |escape"
          query: >
            name=\$section->getLocalizedTitle\(\)(?!\|escape|\|strip_unsafe_html|\|htmlspecialchars)
        - description: "Any getter method used as a {translate} name param without escape"
          query: >
            \{translate\s[^}]*name=\$[a-zA-Z_]+->get[A-Z][a-zA-Z]+\(\)(?!\|escape|\|strip_unsafe_html)
    false_positive_conditions:
      - id: "FP-006-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The |escape modifier is chained to the variable in the template:
          name=$section->getLocalizedTitle()|escape.
      - id: "FP-006-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The |strip_unsafe_html Smarty modifier is applied to the variable.
      - id: "FP-006-C"
        verdict: "SAFE — suppress alert"
        condition: >
          The PHP controller layer explicitly calls htmlspecialchars() or a
          trusted sanitization function on the value before assigning it to
          the Smarty template variable.
      - id: "FP-006-D"
        verdict: "SAFE — suppress alert"
        condition: >
          The getter method returns a strictly numeric value (e.g., integer
          ID or version string) that cannot contain HTML special characters.
    remediation: >
      Append the |escape Smarty modifier to the dynamic variable in the template:
        {translate key="about.onlineSubmissions.submitToSection"
                   name=$section->getLocalizedTitle()|escape
                   url=$sectionSubmissionUrl}
    references:
      - "https://github.com/pkp/pkp-lib/commit/8b26ee404af3b11803a40e904f985f0a0b215a5c"
      - "https://huntr.com/bounties/5c147ff8-3cc4-4f21-9f1c-13fd50957dad"
      - "https://nvd.nist.gov/vuln/detail/CVE-2023-5903"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-007 | CVE-2023-5626 | CWE-352 | HIGH
  # CSRF — Missing FormValidatorCSRF in PaymentTypesForm Constructor (single VG)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-007"
    name: "CVE-2023-5626 — Missing FormValidatorCSRF in PaymentTypesForm __construct()"
    description: >
      The PaymentTypesForm class constructor (classes/subscription/form/PaymentTypesForm.inc.php)
      does not register a FormValidatorCSRF check among its validators. When the
      form is submitted (a state-changing operation that creates or modifies
      journal payment types), the absence of CSRF protection allows an attacker
      to forge a cross-origin request that an authenticated Journal Manager
      will execute, leading to unauthorized creation, modification, or deletion
      of payment types or fee structures.
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-352"
    owasp: "A01:2021"
    confidence: "HIGH"
    ojs_versions_affected: "< 3.3.0-15"
    cve_references:
      - "CVE-2023-5626"
    scan_scope:
      file_paths:
        - "classes/subscription/form/PaymentTypesForm.inc.php"
        - "classes/subscription/form/PaymentTypesForm.php"
      target_functions:
        - "__construct"
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "Form constructor contains state-changing string key but no FormValidatorCSRF"
          query: >
            (method_declaration
              name: (name) @fn (#eq? @fn "__construct")
              body: (compound_statement) @body
              (#match? @body "payment|subscription|fee|manager")
              (#not-match? @body "FormValidatorCSRF")
            )
        - description: "Regex — constructor initializing form checks without CSRF validator"
          type: "regex"
          query: >
            (?s)public\s+function\s+__construct\s*\(\s*\)\s*\{(?:(?!FormValidatorCSRF).)*?manager\.payment\.form
    false_positive_conditions:
      - id: "FP-007-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The constructor (or a parent class __construct()) includes
          $this->addCheck(new FormValidatorCSRF($this)). Verify the full class
          hierarchy before suppressing.
      - id: "FP-007-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The form is exclusively used for HTTP GET / read-only display.
      - id: "FP-007-C"
        verdict: "SAFE — suppress alert"
        condition: >
          CSRF protection is applied at a global middleware layer
          (e.g., Laravel's VerifyCsrfToken middleware active for all routes).
      - id: "FP-007-D"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          The parent class has a generic CSRF check but the child class
          overrides __construct() without calling parent::__construct().
    remediation: >
      Add FormValidatorCSRF as the final check in the constructor:
        public function __construct() {
            // ... existing validators ...
            $this->addCheck(new FormValidatorCSRF($this));
        }
    references:
      - "https://github.com/pkp/ojs/commit/99a9f393190383454aa5ddffedffc89596f6c682"
      - "https://huntr.dev/bounties/c99279c1-709a-4e7b-a042-010c2bb44d6b"
      - "https://nvd.nist.gov/vuln/detail/CVE-2023-5626"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-008-A | CVE-2019-19909 | CWE-502 | HIGH
  # PHP Object Injection in PKPToolsHandler (Report Generator)
  # JSON has 2 version_groups for DIFFERENT FILES → split by file (-A / -B)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-008-A"
    name: "CVE-2019-19909 — PHP Object Injection via unserialize() in PKPToolsHandler"
    description: >
      The Report Generator handler (pages/management/PKPToolsHandler.inc.php)
      reads the 'filters' and 'orderBy' URL parameters via $request->getUserVar()
      and passes them directly to PHP's native unserialize() function. PHP's
      unserialize() instantiates arbitrary objects based on the serialized
      string and automatically invokes magic methods (__wakeup, __destruct,
      __toString) during deserialization. An authenticated Journal Manager who
      can access the Report Generator can craft a malicious serialized object
      string using an existing PHP class in the application's autoloader
      namespace (a "gadget chain") to achieve arbitrary code execution.
      This rule variant targets PKPToolsHandler specifically — see -B for the
      paired sink in PKPStatisticsHelper (used to construct the URL).
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-502"
    owasp: "A08:2021"
    confidence: "HIGH"
    ojs_versions_affected: "< 3.1.2-2"
    cve_references:
      - "CVE-2019-19909"
    scan_scope:
      file_paths:
        - "pages/management/PKPToolsHandler.inc.php"
        - "lib/pkp/pages/management/PKPToolsHandler.inc.php"
      target_functions:
        - "generateReport"
    taint_analysis:
      sources:
        - "$request->getUserVar('filters')"
        - "$request->getUserVar('orderBy')"
      sinks:
        - "unserialize()"
      sanitizers:
        - "json_decode()"
      propagation_path: >
        URL GET parameter (?filters=...)
          → $request->getUserVar('filters')
          → [NO sanitization]
          → unserialize($request->getUserVar('filters'))
          → PHP object instantiation → magic methods → RCE
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "unserialize() directly wrapping getUserVar() result"
          query: >
            (function_call_expression
              function: (name) @fn (#eq? @fn "unserialize")
              arguments: (arguments
                (argument
                  (member_call_expression
                    name: (name) @method (#eq? @method "getUserVar")
                  )
                )
              )
            )
        - description: "Regex — unserialize on any request user variable"
          type: "regex"
          query: >
            unserialize\s*\(\s*\$request->getUserVar\s*\(
    false_positive_conditions:
      - id: "FP-008-A-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The unserialize() call has been replaced by json_decode() OR is gated
          with `unserialize($x, ['allowed_classes' => false])`. Either form
          prevents arbitrary object instantiation.
      - id: "FP-008-A-B"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          The variable was preprocessed via base64_decode / urldecode but still
          originates from $request->getUserVar(). These transformations don't
          prevent object injection.
    remediation: >
      Replace unserialize() with json_decode():
        // VULNERABLE:
        $filters = unserialize($request->getUserVar('filters'));
        // SAFE:
        $filters = json_decode($request->getUserVar('filters'), true);
    references:
      - "https://github.com/pkp/pkp-lib/issues/5302"
      - "https://github.com/pkp/pkp-lib/compare/3_1_2-1...3_1_2-2"
      - "https://nvd.nist.gov/vuln/detail/CVE-2019-19909"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-008-B | CVE-2019-19909 | CWE-502 | HIGH
  # PHP Object Injection — paired serialize() in PKPStatisticsHelper::getReportUrl
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-008-B"
    name: "CVE-2019-19909 — Companion serialize() in PKPStatisticsHelper::getReportUrl"
    description: >
      Paired with OJS-SC-CVE-008-A: PKPStatisticsHelper::getReportUrl()
      (classes/statistics/PKPStatisticsHelper.inc.php) was the producer that
      serialize()'d the filter/orderBy arrays into the URL the Report Generator
      later un-serialize()'d. The patch in 3.1.2-2 replaces serialize() with
      json_encode() here, which is what makes the json_decode() side of -A
      actually work end-to-end. Detecting either side without the other
      misses half the fix and can leave a half-patched system flagged as
      either fully patched (-A only) or fully vulnerable (-B only).
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-502"
    owasp: "A08:2021"
    confidence: "HIGH"
    ojs_versions_affected: "< 3.1.2-2"
    cve_references:
      - "CVE-2019-19909"
    scan_scope:
      file_paths:
        - "classes/statistics/PKPStatisticsHelper.inc.php"
        - "lib/pkp/classes/statistics/PKPStatisticsHelper.inc.php"
      target_functions:
        - "getReportUrl"
    taint_analysis:
      sources:
        - "$filter (function parameter, includes user-controlled fields)"
      sinks:
        - "serialize() — output flows into URL → consumed by unserialize() in PKPToolsHandler"
      sanitizers:
        - "json_encode()"
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "serialize() call inside getReportUrl"
          query: >
            (function_call_expression
              function: (name) @fn (#eq? @fn "serialize")
            )
        - description: "Regex — serialize() in getReportUrl context"
          type: "regex"
          query: >
            function\s+getReportUrl[\s\S]*?serialize\s*\(
    false_positive_conditions:
      - id: "FP-008-B-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The serialize() call has been replaced by json_encode() inside
          getReportUrl, AND the corresponding consumer in PKPToolsHandler
          (-A) uses json_decode(). Both sides must be migrated together.
      - id: "FP-008-B-B"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          serialize() has been replaced by json_encode() in getReportUrl but
          the consumer in PKPToolsHandler still calls unserialize(). This is
          a half-patch and the application will throw on the JSON string.
    remediation: >
      In getReportUrl(), replace serialize() with json_encode():
        $filterEncoded = json_encode($filter);
        $orderByEncoded = json_encode($orderBy);
      Ensure the matching consumer in PKPToolsHandler::generateReport uses
      json_decode().
    references:
      - "https://github.com/pkp/pkp-lib/issues/5302"
      - "https://github.com/pkp/pkp-lib/compare/3_1_2-1...3_1_2-2"
      - "https://nvd.nist.gov/vuln/detail/CVE-2019-19909"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-009 | CVE-2025-13469 | CWE-79 | LOW
  # Stored XSS — manualInstructions rendered with |nl2br only (single VG, 3 commits)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-009"
    name: "CVE-2025-13469 — Stored XSS via Manual Payment Instructions Missing strip_unsafe_html"
    description: >
      The Manual Payment Plugin's payment form template (paymentForm.tpl) renders
      the 'manualInstructions' setting using {$manualInstructions|nl2br}, which
      converts newlines to <br> HTML tags but does NOT sanitize dangerous HTML
      or JavaScript. A Journal Manager who configures manual payment instructions
      can store an XSS payload in this field. The payload is persisted in the
      database and executed in the victim's browser (typically an author
      completing payment) when the payment form page is loaded. The same fix
      (prepending |strip_unsafe_html before |nl2br) was committed across
      stable-3_3_0, stable-3_4_0, and stable-3_5_0 with identical content.
    severity: "LOW"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_versions_affected: "3.3.0-x, 3.4.0-x, 3.5.0-x prior to fix"
    cve_references:
      - "CVE-2025-13469"
    scan_scope:
      file_paths:
        - "plugins/paymethod/manual/templates/paymentForm.tpl"
        - "plugins/paymethod/**/templates/*.tpl"
      target_context: "Smarty variable rendered with |nl2br but missing |strip_unsafe_html"
    pattern_match:
      type: "regex"
      patterns:
        - description: "manualInstructions rendered with nl2br only"
          query: >
            \{\$manualInstructions\|nl2br\}(?!\s*.*strip_unsafe_html)
        - description: "Any Smarty variable rendered with nl2br but no HTML sanitization"
          query: >
            \{\$[a-zA-Z_]+\|nl2br\}(?!.*strip_unsafe_html|.*escape)
    false_positive_conditions:
      - id: "FP-009-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The |strip_unsafe_html modifier is prepended before |nl2br:
          {$manualInstructions|strip_unsafe_html|nl2br}. Order matters —
          strip_unsafe_html MUST come before nl2br.
      - id: "FP-009-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The |escape modifier is used instead of or alongside
          |strip_unsafe_html, producing HTML-encoded output.
      - id: "FP-009-C"
        verdict: "SAFE — suppress alert"
        condition: >
          The PHP controller layer applies strip_tags() or htmlspecialchars()
          to 'manualInstructions' before assigning it to Smarty.
    remediation: >
      Prepend |strip_unsafe_html before |nl2br:
        <p>{$manualInstructions|strip_unsafe_html|nl2br}</p>
    references:
      - "https://github.com/pkp/pkp-lib/issues/12022"
      - "https://vuldb.com/?id.333042"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-010-V33 | CVE-2023-5894 | CWE-79 | MEDIUM
  # Stored XSS — Issue grid getIssueIdentification (3.3.x: array() syntax)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-010-V33"
    name: "CVE-2023-5894 — Stored XSS via Issue Title in __() Translation (3.3.x)"
    description: >
      The Issue Grid handlers (IssueGridCellProvider.inc.php, IssueGridRow.inc.php)
      call $issue->getIssueIdentification() and pass the result as a substitution
      parameter to the translation helper __('editor.issues.editIssue', array(...))
      without HTML escaping. This rule variant targets the 3.3.x branch where
      the array literal is written in long-form `array(...)` syntax.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_branch: "stable-3_3_0"
    ojs_versions_affected: "< 3.3.0-16"
    cve_references:
      - "CVE-2023-5894"
    scan_scope:
      file_paths:
        - "controllers/grid/issues/IssueGridCellProvider.inc.php"
        - "controllers/grid/issues/IssueGridRow.inc.php"
      target_functions:
        - "getCellActions"
        - "initialize"
    taint_analysis:
      sources:
        - "$issue->getIssueIdentification()"
      sinks:
        - "__()"
      sanitizers:
        - "htmlspecialchars()"
      propagation_path: >
        Issue title/volume/year (user-controlled fields)
          → $issue->getIssueIdentification()
          → array('issueIdentification' => $issue->getIssueIdentification())
          → __('editor.issues.editIssue', [...])
          → Output rendered in browser (Edit Issue modal label) — XSS executed
    pattern_match:
      type: "ast_pattern"
      patterns:
        - description: "getIssueIdentification() in __() with array() syntax, no htmlspecialchars"
          query: >
            (function_call_expression
              function: (name) @fn (#eq? @fn "__")
              arguments: (arguments
                (argument (string))
                (argument
                  (function_call_expression
                    function: (name) @arr (#eq? @arr "array")
                    arguments: (arguments
                      (argument
                        (array_element_initializer
                          key: (string (string_value) @key (#eq? @key "issueIdentification"))
                          value: (member_call_expression
                            name: (name) @method (#eq? @method "getIssueIdentification")
                          )
                        )
                      )
                    )
                  )
                )
              )
            )
        - description: "Regex — array() syntax (3.3.x)"
          type: "regex"
          query: >
            __\s*\(\s*['"]editor\.issues\.editIssue['"]\s*,\s*array\(\s*['"]issueIdentification['"]\s*=>\s*(?!htmlspecialchars)\$issue->getIssueIdentification\(\)
    false_positive_conditions:
      - id: "FP-010-V33-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The getIssueIdentification() call is wrapped with htmlspecialchars():
          'issueIdentification' => htmlspecialchars($issue->getIssueIdentification())
      - id: "FP-010-V33-B"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          A different sanitization function (e.g., strip_tags()) is applied
          but htmlspecialchars() is absent.
    remediation: >
      Wrap getIssueIdentification() with htmlspecialchars():
        __('editor.issues.editIssue', array(
            'issueIdentification' => htmlspecialchars($issue->getIssueIdentification())
        ))
    references:
      - "https://github.com/pkp/ojs/commit/66927de1a82e3a3004db9741d1505ddac0980e63"
      - "https://huntr.com/bounties/aba3ba5b-aa6b-4076-b663-4237b4a0761d"
      - "https://nvd.nist.gov/vuln/detail/CVE-2023-5894"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-010-V34V35 | CVE-2023-5894 | CWE-79 | MEDIUM
