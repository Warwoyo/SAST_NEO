  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-011 | CVE-2018-12229 | CWE-79 | MEDIUM
  # Reflected XSS — $authors in search.tpl HTML input value without |escape
  # Single version_group (OJS 3.0.0–3.1.1-1); no split needed
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-011"
    name: "CVE-2018-12229 — Reflected XSS via 'authors' Parameter in Search Template"
    description: >
      The frontend search template (templates/frontend/pages/search.tpl) reflects
      the GET 'authors' parameter value directly into the value attribute of an
      HTML <input> element using {$authors} without the Smarty |escape modifier.
      An unauthenticated attacker can craft a URL where the 'authors' query
      parameter contains HTML-breaking characters (e.g., "><script>alert(1)</script>)
      and trick a user into clicking the link. The malicious script content is
      reflected in the page response and executed immediately in the victim's
      browser, constituting a Reflected XSS attack requiring no authentication.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_versions_affected: "3.0.0 — 3.1.1-1"
    cve_references:
      - "CVE-2018-12229"
    scan_scope:
      file_paths:
        - "templates/frontend/pages/search.tpl"
        - "templates/frontend/**/*.tpl"
      target_context: >
        Smarty variables assigned to HTML element attribute values without
        |escape, particularly in search-related templates
    pattern_match:
      type: "regex"
      patterns:
        - description: "$authors in value attribute without |escape"
          query: >
            value=\s*['"]\{\$authors\}['"](?!\|escape)
        - description: "Any Smarty variable in value attribute without |escape"
          query: >
            value=\s*['"]\{\$[a-zA-Z_][a-zA-Z0-9_]*\}['"](?!.*\|escape)
        - description: "Smarty variable in href/src/action/data attributes without |escape"
          query: >
            (?:href|src|action|data-[a-z]+)=\s*['"]\{\$[a-zA-Z_][a-zA-Z0-9_]*\}['"](?!\|escape)
    false_positive_conditions:
      - id: "FP-011-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The |escape modifier is appended to the Smarty variable:
          value="{$authors|escape}". This HTML-encodes all special characters.
      - id: "FP-011-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The PHP controller applies htmlspecialchars() or intval() to the value
          before assigning it to Smarty, AND the template variable name can be
          traced back to that specific controlled assignment.
      - id: "FP-011-C"
        verdict: "SAFE — suppress alert"
        condition: >
          The variable is guaranteed to be a strict integer (e.g., numeric page
          count, year filter) cast via (int) or intval() before template
          assignment. Integer values cannot contain HTML special characters.
      - id: "FP-011-D"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          The variable is passed through htmlentities() but within a context
          where the output is assigned to a JavaScript event attribute (e.g.,
          onclick=), where HTML entity encoding alone is insufficient.
    remediation: >
      Append the |escape modifier to all Smarty variables used in HTML attribute
      value contexts in search templates:
        <input type="text" name="authors" value="{$authors|escape}">
      Apply this pattern consistently across all search form fields that reflect
      user-supplied GET parameters.
    references:
      - "https://github.com/pkp/pkp-lib/issues/3785"
      - "https://metamorfosec.com/Files/Advisories/METS-2018-001-A_XSS_Vulnerability_in_OJS_3.0.0_to_3.1.1-1.txt"
      - "https://nvd.nist.gov/vuln/detail/CVE-2018-12229"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-012 | CVE-2022-26616 + CVE-2022-24181 | CWE-644 | HIGH
  # Host Header Injection — Unvalidated HTTP_HOST / HTTP_X_FORWARDED_HOST
  # Single version_group; two CVE IDs cover the same code path
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-012"
    name: "CVE-2022-26616 — Host Header Injection via Unvalidated $_SERVER HTTP_HOST"
    description: >
      The PKPRequest class (classes/core/PKPRequest.inc.php or PKPRequest.php)
      resolves the server host name from HTTP request headers in priority order:
      HTTP_X_FORWARDED_HOST, HTTP_HOST, then SERVER_NAME. This resolved host
      value is used to construct absolute URLs throughout the application (e.g.,
      in password reset email links, API base URLs, and HTML output). Because
      the resolved host is not validated against a trusted allowlist before use,
      an attacker who can control or spoof these HTTP headers can inject an
      arbitrary host value. This enables Web Cache Poisoning, Password Reset
      Poisoning, and Reflected XSS (CVE-2022-24181 covers the XSS vector
      specifically, while CVE-2022-26616 covers the general host injection).
    severity: "HIGH"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-644"
    owasp: "A05:2021"
    confidence: "MEDIUM"
    ojs_versions_affected: "<= 3.3.0-8, <= 3.2.1-3"
    cve_references:
      - "CVE-2022-26616"
      - "CVE-2022-24181"
    scan_scope:
      file_paths:
        - "classes/core/PKPRequest.inc.php"
        - "classes/core/PKPRequest.php"
        - "lib/pkp/classes/core/PKPRequest.inc.php"
        - "lib/pkp/classes/core/PKPRequest.php"
      target_functions:
        - "getServerHost"
        - "_getServerHost"
    pattern_match:
      type: "regex"
      patterns:
        - description: "HTTP_HOST read without in_array allowlist validation"
          query: >
            \$_SERVER\s*\[\s*['"]HTTP_HOST['"]\s*\](?![\s\S]{0,200}in_array)
        - description: "HTTP_X_FORWARDED_HOST read without in_array allowlist validation"
          query: >
            \$_SERVER\s*\[\s*['"]HTTP_X_FORWARDED_HOST['"]\s*\](?![\s\S]{0,200}in_array)
        - description: "Combined — any unguarded HTTP host header access"
          query: >
            \$_SERVER\s*\[\s*['"]HTTP_(?:X_FORWARDED_)?HOST['"]\s*\]\s*(?![\s\S]{0,300}(?:in_array|allowed_hosts|strtolower\s*\(.*\$.*\)|json_decode))
    false_positive_conditions:
      - id: "FP-012-A"
        verdict: "SAFE — suppress alert"
        condition: >
          The retrieved host value is explicitly validated using in_array()
          against a list of allowed hosts loaded from the application
          configuration (Config::getVar('general', 'allowed_hosts') with
          json_decode). Both HTTP_HOST and HTTP_X_FORWARDED_HOST must be
          validated (not just one). Canonical patch from OJS 3.3.0-9.
      - id: "FP-012-B"
        verdict: "SAFE — suppress alert"
        condition: >
          The server is configured with a reverse proxy that strips and
          re-injects the Host and X-Forwarded-Host headers from a trusted
          source, AND the PHP code reads only $_SERVER['SERVER_NAME'].
      - id: "FP-012-C"
        verdict: "REVIEW NEEDED — do not suppress"
        condition: >
          strtolower() or strtok() is applied to the host value but no
          allowlist validation follows. Normalization alone does not prevent
          injection of a legitimate-appearing attacker-controlled domain.
    remediation: >
      Implement allowed_hosts allowlist validation after host header resolution:
        $serverHost = isset($_SERVER['HTTP_X_FORWARDED_HOST'])
            ? $_SERVER['HTTP_X_FORWARDED_HOST']
            : (isset($_SERVER['HTTP_HOST'])
                ? $_SERVER['HTTP_HOST']
                : $_SERVER['SERVER_NAME'] ?? $default);
        $serverHost = strtok($serverHost, ',');
        if (($allowedHosts = Config::getVar('general', 'allowed_hosts')) !== '') {
            $allowedHosts = array_map('strtolower', json_decode($allowedHosts));
            $serverHost = in_array(strtolower($serverHost), $allowedHosts)
                ? $serverHost
                : $default;
        }
        $this->_serverHost = $serverHost;
      Also configure the allowed_hosts array in config.inc.php.
    references:
      - "https://github.com/pkp/pkp-lib/issues/7649"
      - "https://forum.pkp.sfu.ca/t/ojs-omp-ops-3-3-0-9-released/72236"
      - "https://nvd.nist.gov/vuln/detail/CVE-2022-26616"
      - "https://nvd.nist.gov/vuln/detail/CVE-2022-24181"

  # ─────────────────────────────────────────────────────────────────────────────
  # OJS-SC-CVE-013 | CVE-2024-25438 | CWE-79 | MEDIUM  ← NEW
  # Stored XSS — Add Discussion Subject (Submission Stage) — Modal Title Sink
  # Verifiable source: pkp/pkp-lib commit a0485a5, issue #9396, milestone 3.3.0-16
  # JSON has 1 version_group → 1 rule; scan_scope covers both .inc.php and .php
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "OJS-SC-CVE-013"
    name: "CVE-2024-25438 — Stored XSS in Add Discussion Subject Modal Title (Submission Stage)"
    description: >
      The QueryTitleGridColumn class (controllers/grid/queries/QueryTitleGridColumn.php)
      builds the 'readQuery' LinkAction used in the Submission-stage workflow
      discussion (Add Discussion) grid. Inside getCellActions(), the second
      argument of the AjaxModal constructor — used as the modal window title —
      was populated directly from $headNote->getTitle() without HTML-encoding.
      An authenticated user with discussion access (Author, Editor) can store an
      XSS payload as the discussion subject. When other workflow participants
      open the discussion list, the payload fires in their browser context via
      the unescaped modal title string.

      Verified diff from commit a0485a5 (pkp/pkp-lib, issue #9396, 3.3.0-16):
        VULNERABLE line 96:  $headNote ? $headNote->getTitle() : '&mdash;',
        PATCHED    line 96:  $headNote ? htmlspecialchars($headNote->getTitle()) : '&mdash;',

      PKP confirmed in issue #9750 that commit a0485a5 resolves both
      CVE-2024-25438 (Submission) and CVE-2024-25436 (Production) because
      QueryTitleGridColumn is the shared column class for ALL workflow-stage
      discussion grids. The companion rule OJS-SC-CVE-014 tracks the Production
      stage CVE for independent audit and reporting purposes.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "ojs_specific"
    cwe: "CWE-79"
    owasp: "A03:2021"
    confidence: "HIGH"
    ojs_versions_affected: >
      OJS/OMP/OPS prior to 3.3.0-16 (stable-3_3_0 branch).
      Confirmed resolved in stable-3_4_0 per PKP response in pkp/pkp-lib#9750.
    cve_references:
      - "CVE-2024-25438"
    scan_scope:
      file_paths:
        - "controllers/grid/queries/QueryTitleGridColumn.php"
        - "controllers/grid/queries/QueryTitleGridColumn.inc.php"
        - "lib/pkp/controllers/grid/queries/QueryTitleGridColumn.php"
        - "lib/pkp/controllers/grid/queries/QueryTitleGridColumn.inc.php"
      target_functions:
        - "getCellActions"
    taint_analysis:
      sources:
        - "$headNote->getTitle()" # Discussion subject stored by user in DB
        - "$note->getTitle()" # Alias for the same getter
      sinks:
        - "AjaxModal constructor 2nd argument (modal title rendered as HTML)"
      sanitizers:
        - "htmlspecialchars($headNote->getTitle())" # Canonical fix — commit a0485a5
      propagation_path: >
        User enters discussion subject → stored in notes table as head-note title
          → getCellActions() retrieves $headNote->getTitle()
          → passed raw as 2nd arg of new AjaxModal(...)
          → rendered in modal title bar without encoding → XSS in victim browser
    pattern_match:
      type: "regex"
      patterns:
        - description: "Ternary with raw getTitle() in AjaxModal title argument (no htmlspecialchars)"
          query: >
