rules:
  - id: "OJS-SC-RCE-001"
    name: "Remote Code Execution via eval with user input"
    description: >
      The eval() function executes arbitrary PHP code. If it receives
      user-controlled input, an attacker can execute arbitrary commands.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-94"
    owasp: "A03:2021"
    taint_analysis:
      sources:
        - "$_GET"
        - "$_POST"
        - "$_REQUEST"
      sinks:
        - "eval"
      sanitizers: []
    pattern_match:
      type: "regex"
      patterns:
        - 'eval\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)\['
        - 'eval\s*\(\s*\$\w+\s*\)'
        - 'eval\s*\(\s*base64_decode\s*\('
    remediation: >
      Remove eval() usage entirely. There is almost never a valid reason
      to use eval() in production code. Use proper control flow instead.
    references:
      - "https://cwe.mitre.org/data/definitions/94.html"

  - id: "OJS-SC-RCE-002"
    name: "Command Injection via shell execution functions"
    description: >
      Shell execution functions (exec, system, shell_exec, passthru, popen)
      receive user-controlled input, enabling OS command injection.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-78"
    owasp: "A03:2021"
    taint_analysis:
      sources:
        - "$_GET"
        - "$_POST"
        - "$_REQUEST"
        - "Request::getUserVar()"
      sinks:
        - "exec"
        - "shell_exec"
        - "system"
        - "passthru"
        - "popen"
        - "proc_open"
      sanitizers:
        - "escapeshellarg"
        - "escapeshellcmd"
    pattern_match:
      type: "regex"
      patterns:
        - '(exec|system|shell_exec|passthru|popen)\s*\(.*?\$_(GET|POST|REQUEST)'
        - '(exec|system|shell_exec|passthru|popen)\s*\(.*?\$\w+.*?\)'
        - 'proc_open\s*\(.*?\$'
    remediation: >
      Avoid calling shell commands with user input. If necessary,
      use escapeshellarg() for each argument and escapeshellcmd() for the command.

  - id: "OJS-SC-RCE-003"
    name: "Code execution via preg_replace with /e modifier"
    description: >
      The preg_replace() function with the /e modifier evaluates the
      replacement string as PHP code. This is deprecated and dangerous.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-94"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'preg_replace\s*\(\s*["\'']/.*/e["\'']'
        - 'preg_replace\s*\(\s*["\''].*?/[a-z]*e[a-z]*["\'']'
    remediation: >
      Replace preg_replace() with /e modifier with preg_replace_callback().
      The /e modifier is deprecated since PHP 5.5 and removed in PHP 7.0.
