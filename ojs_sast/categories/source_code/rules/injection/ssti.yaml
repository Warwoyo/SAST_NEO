rules:
  - id: "OJS-SC-SSTI-001"
    name: "Server-Side Template Injection via Smarty"
    description: >
      User input is passed directly into a Smarty template evaluation
      context, allowing server-side template injection.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-1336"
    owasp: "A03:2021"
    taint_analysis:
      sources:
        - "$_GET"
        - "$_POST"
        - "Request::getUserVar()"
      sinks:
        - "fetch"
        - "display"
        - "assign"
      sanitizers:
        - "htmlspecialchars()"
        - "strip_tags()"
    pattern_match:
      type: "regex"
      patterns:
        - '\$smarty->fetch\s*\(\s*["\'']string:.*?\$_(GET|POST|REQUEST)'
        - 'TemplateManager.*?fetch\s*\(\s*["\'']string:.*?\$'
        - '->assign\s*\([^)]*\$_(GET|POST|REQUEST)'
    remediation: >
      Never pass raw user input into Smarty template strings.
      Assign variables separately and use {$var|escape} in templates.
    references:
      - "https://cwe.mitre.org/data/definitions/1336.html"

  - id: "OJS-SC-SSTI-002"
    name: "Dynamic template path from user input"
    description: >
      The template file path is constructed from user input, which
      could allow an attacker to load arbitrary template files.
    severity: "HIGH"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-1336"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '->display\s*\(\s*\$_(GET|POST|REQUEST)\['
        - '->fetch\s*\(\s*\$_(GET|POST|REQUEST)\['
        - 'TemplateManager.*?(display|fetch)\s*\(\s*\$\w+'
    remediation: >
      Use a whitelist of allowed template names and never construct
      template paths from user input.

  - id: "OJS-SC-SSTI-003"
    name: "Smarty {php} tag usage"
    description: >
      The deprecated Smarty {php} tag allows execution of arbitrary PHP code
      within templates. This should never be used.
    severity: "HIGH"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-94"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '\{php\}.*?\{/php\}'
        - '\{php\}'
    remediation: >
      Remove all {php} tags from Smarty templates. Use Smarty plugins
      or PHP handler classes instead.
