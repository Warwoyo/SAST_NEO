rules:
  - id: "OJS-SC-SQLI-001"
    name: "SQL Injection via tainted input in raw query"
    description: >
      Data from user input flows directly into a database query function
      without adequate sanitization, allowing an attacker to manipulate the SQL query.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-89"
    owasp: "A03:2021"
    cve_references: []
    ojs_versions_affected: "all"
    taint_analysis:
      sources:
        - "$_GET"
        - "$_POST"
        - "$_REQUEST"
        - "Request::getUserVar()"
        - "$request->getUserVar()"
      sinks:
        - "->query()"
        - "->retrieve()"
        - "->update()"
        - "mysql_query()"
        - "mysqli_query()"
      sanitizers:
        - "->escapeString()"
        - "intval()"
        - "floatval()"
        - "PDO::quote()"
    pattern_match:
      type: "regex"
      patterns:
        - '\$_(GET|POST|REQUEST)\[.+?\].*?->(query|retrieve|update)\('
        - 'mysql_query\s*\(\s*["\''].*?\$_(GET|POST|REQUEST)'
        - 'mysqli_query\s*\(.+?\$_(GET|POST|REQUEST)'
    remediation: >
      Use prepared statements or ensure every input is escaped
      using $this->_driver->escapeString() before being inserted into a query.
      For integer parameters, use intval().
    references:
      - "https://cwe.mitre.org/data/definitions/89.html"
      - "https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html"
    false_positive_notes: >
      Cases where values are validated with intval() or is_numeric()
      beforehand are not vulnerable.

  - id: "OJS-SC-SQLI-002"
    name: "SQL Injection via string concatenation in query"
    description: >
      A SQL query is built using string concatenation with variables that
      may contain user input, creating a SQL injection vulnerability.
    severity: "HIGH"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-89"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - '(->query|->retrieve|->update)\s*\(\s*["\''].*?\.\s*\$\w+'
        - 'SELECT\s+.*?FROM\s+.*?\.\s*\$\w+.*?WHERE'
        - 'INSERT\s+INTO\s+.*?\.\s*\$\w+'
    remediation: >
      Never concatenate variables into SQL strings. Use parameterized queries
      or the OJS DAO pattern with proper escaping.
    references:
      - "https://cwe.mitre.org/data/definitions/89.html"

  - id: "OJS-SC-SQLI-003"
    name: "SQL Injection in OJS DAO retrieve method"
    description: >
      The OJS DAO retrieve() method is called with interpolated variables,
      which may allow SQL injection if the variables are not properly sanitized.
    severity: "CRITICAL"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-89"
    owasp: "A03:2021"
    taint_analysis:
      sources:
        - "$_GET"
        - "$_POST"
        - "Request::getUserVar()"
        - "PKPRequest::getUserVar()"
      sinks:
        - "retrieve"
        - "retrieveRange"
        - "retrieveLimit"
      sanitizers:
        - "escapeString"
        - "intval"
        - "is_numeric"
    pattern_match:
      type: "regex"
      patterns:
        - '\$this->retrieve\s*\(\s*["\''].*?\.\s*\$(?!this)\w+'
        - 'retrieveRange\s*\(\s*["\''].*?\.\s*\$\w+'
    remediation: >
      Use the array-based parameter binding in OJS DAO:
      $this->retrieve('SELECT * FROM t WHERE id = ?', array((int) $id));
