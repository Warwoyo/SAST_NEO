rules:
  - id: "OJS-SC-XSS-001"
    name: "Reflected XSS via direct output of user input"
    description: >
      User input from superglobals is directly echoed to the browser
      without HTML encoding, allowing reflected XSS attacks.
    severity: "HIGH"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-79"
    owasp: "A03:2021"
    taint_analysis:
      sources:
        - "$_GET"
        - "$_POST"
        - "$_REQUEST"
        - "Request::getUserVar()"
      sinks:
        - "echo"
        - "print"
        - "printf()"
      sanitizers:
        - "htmlspecialchars()"
        - "htmlentities()"
        - "strip_tags()"
        - "PKPString::stripUnsafeHtml()"
    pattern_match:
      type: "regex"
      patterns:
        - 'echo\s+\$_(GET|POST|REQUEST|COOKIE)\['
        - 'print\s+\$_(GET|POST|REQUEST|COOKIE)\['
        - '<?=\s*\$_(GET|POST|REQUEST)\['
    remediation: >
      Apply htmlspecialchars($var, ENT_QUOTES, 'UTF-8') before output.
      In Smarty templates, use {$var|escape:'html'}.
    references:
      - "https://cwe.mitre.org/data/definitions/79.html"

  - id: "OJS-SC-XSS-002"
    name: "Stored XSS via Smarty template assign without escaping"
    description: >
      The OJS $templateMgr->assign() method passes unsanitized data
      to a Smarty template, which may render it without escaping.
    severity: "HIGH"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-79"
    owasp: "A03:2021"
    taint_analysis:
      sources:
        - "$_GET"
        - "$_POST"
        - "Request::getUserVar()"
        - "getUserVar"
      sinks:
        - "assign"
        - "display"
      sanitizers:
        - "htmlspecialchars()"
        - "strip_tags()"
        - "stripUnsafeHtml()"
    pattern_match:
      type: "regex"
      patterns:
        - '\$templateMgr->assign\s*\([^,]+,\s*\$_(GET|POST|REQUEST)\['
        - 'templateMgr->assign\s*\([^,]+,\s*\$request->getUserVar'
    remediation: >
      Sanitize data before assigning to templates. Use
      PKPString::stripUnsafeHtml() for rich text or htmlspecialchars() for plain text.

  - id: "OJS-SC-XSS-003"
    name: "DOM-based XSS in JavaScript"
    description: >
      JavaScript code uses document.location, document.URL, or other DOM sources
      to write content to the page without sanitization.
    severity: "MEDIUM"
    category: "source_code"
    subcategory: "injection"
    cwe: "CWE-79"
    owasp: "A03:2021"
    pattern_match:
      type: "regex"
      patterns:
        - 'document\.write\s*\(.*?(location|document\.URL|document\.referrer)'
        - 'innerHTML\s*=.*?(location|document\.URL|document\.referrer)'
        - '\.html\s*\(.*?(location\.hash|location\.search)'
    remediation: >
      Use textContent instead of innerHTML. Sanitize all DOM-sourced data
      before inserting into the page.
